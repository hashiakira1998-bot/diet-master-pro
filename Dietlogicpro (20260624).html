const calcBMR=(w,h,a,s)=>s==="male"?(10*w)+(6.25*h)-(5*a)+5:(10*w)+(6.25*h)-(5*a)-161;
const ACT={sedentary:{label:"座位中心",factor:1.2},light:{label:"軽い運動（週1〜2回）",factor:1.375},moderate:{label:"中程度（週3〜5回）",factor:1.55},active:{label:"激しい運動（週6〜7回）",factor:1.725},veryActive:{label:"毎日の激しい運動",factor:1.9}};
const calcTDEE=(bmr,act)=>bmr*(ACT[act]?.factor??1.55);
const calcPFC=(tdee,goal,lean,pPct=30,fPct=25,custom="")=>{let cal=tdee;if(goal==="cut")cal=tdee-500;else if(goal==="bulk")cal=tdee+300;else if(goal==="custom"&&custom){const n=parseFloat(custom);if(!isNaN(n))cal=tdee+n;}const p=pPct?(cal*pPct)/100/4:lean?lean*2.2:(cal*0.3)/4;const f=fPct?(cal*fPct)/100/9:(cal*0.25)/9;const c=Math.max(0,(cal-p*4-f*9)/4);return{calories:Math.round(cal),protein:Math.round(p),fat:Math.round(f),carbs:Math.round(c)};};
const calcBMI=(w,h)=>w/((h/100)**2);
const parseDate=(ds)=>{if(!ds||typeof ds!=="string")return new Date();const p=ds.split("/");if(p.length===3){const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));return isNaN(d)?new Date():d;}const[m,d]=p;const y=new Date().getFullYear();const dt=new Date(y,parseInt(m)-1,parseInt(d));if(isNaN(dt))return new Date();if(dt>new Date())dt.setFullYear(y-1);return dt;};
const parseISO=(s)=>{const d=new Date(s);return isNaN(d)?new Date():d;};
const daysBtwn=(a,b)=>Math.round((b-a)/86400000);
const getWeekRange=(date)=>{const d=new Date(date);const day=d.getDay();const sun=new Date(d);sun.setDate(d.getDate()-day);const sat=new Date(sun);sat.setDate(sun.getDate()+6);return{start:sun,end:sat};};
const fmtDS=(d)=>`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
const fmtShort=(ds)=>{if(!ds)return"";const p=ds.split("/");if(p.length!==3)return ds;const yy=String(p[0]).slice(-2),m=p[1].startsWith("0")?p[1].slice(1):p[1],d=p[2].startsWith("0")?p[2].slice(1):p[2];return yy+"/"+m+"/"+d;};

/* ═══ COMPONENTS ═══ */
function TrendChart({data,mode,onClickDate,goalLine,issnLine,issnUpper,issnLower,showLines,showIssn=true,showGoalLineProp=true,showIssnDashProp=true,showIssnBandProp=true,chartId="main",viewStart=null,viewEnd=null}){
  const viewData=(viewStart&&viewEnd)?data.filter(d=>d.date>=viewStart&&d.date<=viewEnd):data;
  const displayData=viewData.length>0?viewData:data;
  if(!displayData||!displayData.length)return(<div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:"#bbb",fontSize:11}}>データなし</div>);
  const label=mode==="weight"?"weight":"fat",unit=mode==="weight"?"kg":"%",step=mode==="weight"?1:0.5,lineColor=mode==="weight"?"#1a1a1a":"#5a7a5a";
  const vals=displayData.map(d=>d[label]),filled=[];let last=null;
  vals.forEach(v=>{if(v!==null){last=v;filled.push(v);}else filled.push(last);});
  const nonNull=filled.filter(v=>v!==null);
  if(!nonNull.length)return(<div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:"#bbb",fontSize:11}}>データなし</div>);
  const actualMin=Math.min(...nonNull),actualMax=Math.max(...nonNull);
  const actualCenter=(actualMin+actualMax)/2;
  let rangeMin=actualMin,rangeMax=actualMax;
  if(showLines){const allLineVals=[];if(goalLine)goalLine.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(showIssn&&issnLine)issnLine.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(showIssn&&issnUpper)issnUpper.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(showIssn&&issnLower)issnLower.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(allLineVals.length){rangeMin=Math.min(rangeMin,...allLineVals);rangeMax=Math.max(rangeMax,...allLineVals);}}
  const axisMin=+(Math.floor(rangeMin/step)*step-step).toFixed(2);
  const axisMax=+(Math.ceil(rangeMax/step)*step+step).toFixed(2);
  const axisRange=axisMax-axisMin||1;
  /* 論理座標系: 日数×COL_W_FIXED で固定。SVGはviewBox+width:100%でコンテナに合わせて拡縮 */
  const YAXIS_W=38,PAD_T=26,PAD_B=34,PAD_R=4,CHART_H=140;
  const COL_W=52; /* 論理上の1列幅(px)。viewBox拡縮により実際の画面サイズは自動調整 */
  const SCROLL_W=COL_W*displayData.length+PAD_R;
  const H=PAD_T+CHART_H+PAD_B;
  const toX=i=>COL_W*i+COL_W/2;
  const toY=v=>PAD_T+CHART_H-((v-axisMin)/axisRange)*CHART_H;
  const pts=filled.map((v,i)=>`${toX(i)},${toY(v)}`);
  const yLabels=[];for(let v=axisMin;v<=axisMax+0.001;v=+(v+step).toFixed(2))yLabels.push(+v.toFixed(2));
  const getYear=(ds)=>{const p=ds.split("/");return p.length===3?p[0]:"";};
  const clipTop=PAD_T,clipHeight=CHART_H;
  const mkPts=(arr)=>arr?arr.map((w,i)=>`${toX(i)},${toY(w)}`).join(" "):"";
  return(
    <div style={{display:"flex",gap:0,userSelect:"none"}}>
      {/* Y軸: viewBoxに合わせてfontSizeをSVG論理座標系で指定 */}
      <svg viewBox={`0 0 ${YAXIS_W} ${H}`} width={YAXIS_W} height={H} style={{flexShrink:0,display:"block"}}>{yLabels.map((v,i)=>{const y=toY(v);return(<g key={i}><line x1={YAXIS_W-4} y1={y} x2={YAXIS_W} y2={y} stroke="#e0e0de" strokeWidth="1"/><text x={YAXIS_W-6} y={y+4} textAnchor="end" fontSize="9" fill="#9a9a9a" fontFamily="'DM Mono',monospace">{v.toFixed(1)}</text></g>);})}</svg>
      {/* チャート本体: viewBoxで論理座標系を定義し、width:100%でコンテナ幅に自動フィット */}
      <div style={{flex:1,overflow:"hidden",minWidth:0}}>
        <svg viewBox={`0 0 ${SCROLL_W} ${H}`} preserveAspectRatio="none" width="100%" height={H} style={{display:"block"}}>
          <defs><clipPath id={`cClip-${chartId}`}><rect x="0" y={clipTop} width={SCROLL_W} height={clipHeight}/></clipPath></defs>
          {yLabels.map((v,i)=>(<line key={i} x1={0} y1={toY(v)} x2={SCROLL_W} y2={toY(v)} stroke="#ebebea" strokeWidth="1"/>))}
          {showLines&&showIssnBandProp&&issnUpper&&issnLower&&issnUpper.length>0&&(()=>{const upperPts=issnUpper.map((w,i)=>`${toX(i)},${toY(w)}`);const lowerPts=[...issnLower].map((w,i)=>`${toX(i)},${toY(w)}`).reverse();return(<polygon clipPath={`url(#cClip-${chartId})`} points={[...upperPts,...lowerPts].join(" ")} fill="rgba(255,159,64,0.12)" stroke="none"/>);})()}
          {showLines&&showIssnDashProp&&issnLine&&issnLine.length>0&&(<polyline clipPath={`url(#cClip-${chartId})`} points={mkPts(issnLine)} fill="none" stroke="#ff9f40" strokeWidth="2" strokeDasharray="3 3"/>)}
          {showLines&&showGoalLineProp&&goalLine&&goalLine.length>0&&(<polyline clipPath={`url(#cClip-${chartId})`} points={mkPts(goalLine)} fill="none" stroke="#6bcf7f" strokeWidth="2" strokeDasharray="4 2"/>)}
          {/* グレー塗りつぶし削除 */}
          {(()=>{const segs=[];let seg=[];displayData.forEach((d,i)=>{if(d[label]!==null){seg.push(i);}else{if(seg.length>0){segs.push([...seg]);seg=[];}}});if(seg.length>0)segs.push(seg);return segs.map((s,si)=>(<polyline key={si} points={s.map(i=>`${toX(i)},${toY(filled[i])}`).join(" ")} fill="none" stroke={lineColor} strokeWidth="2" strokeLinejoin="round"/>));})()}
          {(()=>{const gaps=[];let prevIdx=null;displayData.forEach((d,i)=>{if(d[label]!==null){if(prevIdx!==null&&i-prevIdx>1){gaps.push([prevIdx,i]);}prevIdx=i;}});return gaps.map(([a,b],gi)=>(<polyline key={gi} points={`${toX(a)},${toY(filled[a])} ${toX(b)},${toY(filled[b])}`} fill="none" stroke={lineColor} strokeWidth="1.5" strokeDasharray="4 4" opacity="0.5"/>));})()}
          {displayData.map((d,i)=>{const v=d[label],fv=filled[i],cx=toX(i),cy=toY(fv),has=v!==null;return(
            <g key={i} style={{cursor:"pointer"}} onClick={()=>onClickDate&&onClickDate(d)}>
              <rect x={cx-COL_W/2} y={H-PAD_B} width={COL_W} height={PAD_B} fill="transparent"/>
              <text x={cx} y={H-16} textAnchor="middle" fontSize="9" fill={has?"#2a2a2a":"#ccc"} fontFamily="'DM Mono',monospace" fontWeight={has?"600":"400"}>{fmtShort(d.date)}</text>
              {(i===0||getYear(d.date)!==(i>0?getYear(displayData[i-1].date):""))&&(<text x={cx} y={H-4} textAnchor="middle" fontSize="8" fill="#f4a261" fontFamily="'DM Mono',monospace" fontWeight="700">{getYear(d.date)}</text>)}
              <circle cx={cx} cy={cy} r={has?5:3} fill="#fff" stroke={has?lineColor:"#ccc"} strokeWidth="2"/>
              {has&&(<text x={cx} y={cy-12} textAnchor="middle" fontSize="10" fontWeight="700" fill={lineColor} fontFamily="'DM Mono',monospace">{v.toFixed(1)}</text>)}
              {d.hicarb&&(<text x={cx} y={cy+18} textAnchor="middle" fontSize="8" fontWeight="700" fill="#ff6b35" fontFamily="'DM Mono',monospace">HC</text>)}
            </g>);})}
          {/* 凡例: viewBox座標系で右上に配置 */}
          {(showGoalLineProp||showIssnDashProp||showIssnBandProp)&&showLines&&(<g transform={`translate(${SCROLL_W-90},${PAD_T+4})`}><rect x="-6" y="-8" width="92" height={(showIssnDashProp||showIssnBandProp)?96:56} rx="4" fill="rgba(255,255,255,0.92)" stroke="#ebebea" strokeWidth="0.5"/><line x1="0" y1="4" x2="22" y2="4" stroke="#1a1a1a" strokeWidth="2"/><text x="26" y="8" fontSize="9" fill="#1a1a1a" fontWeight="600" fontFamily="'DM Mono',monospace">実測</text><line x1="0" y1="22" x2="22" y2="22" stroke="#6bcf7f" strokeWidth="2" strokeDasharray="4 2"/><text x="26" y="26" fontSize="9" fill="#6bcf7f" fontWeight="600" fontFamily="'DM Mono',monospace">目標</text>{(showIssnDashProp||showIssnBandProp)&&(<><line x1="0" y1="42" x2="22" y2="42" stroke="#ff9f40" strokeWidth="2" strokeDasharray="3 3"/><text x="26" y="46" fontSize="9" fill="#ff9f40" fontWeight="600" fontFamily="'DM Mono',monospace">ISSN 0.7%</text><rect x="0" y="56" width="22" height="12" rx="2" fill="rgba(255,159,64,0.25)" stroke="none"/><text x="26" y="66" fontSize="9" fill="#ff9f40" fontWeight="600" fontFamily="'DM Mono',monospace">推奨帯</text></>)}</g>)}
        </svg>
      </div>
    </div>);
}

function MacroRing({protein,fat,carbs}){const t=protein*4+fat*9+carbs*4;const pP=t?(protein*4)/t:0,pF=t?(fat*9)/t:0;const R=48,cx=56,cy=56,sw=11,circ=2*Math.PI*R;const segs=t?[{pct:pP,c:"#1a1a1a"},{pct:pF,c:"#6a6a6a"},{pct:1-pP-pF,c:"#c8c8c6"}]:[];let off=0;return(<svg width="112" height="112" style={{flexShrink:0}}><circle cx={cx} cy={cy} r={R} fill="none" stroke="#ebebea" strokeWidth={sw}/>{segs.map((s,i)=>{const dash=s.pct*circ;const el=(<circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={s.c} strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off*circ} style={{transform:"rotate(-90deg)",transformOrigin:`${cx}px ${cy}px`}}/>);off+=s.pct;return el;})}<text x={cx} y={cy-5} textAnchor="middle" fill="#1a1a1a" fontSize="13" fontWeight="600" fontFamily="'DM Mono',monospace">{Math.round(t)}</text><text x={cx} y={cy+11} textAnchor="middle" fill="#6a6a6a" fontSize="9" fontFamily="'DM Mono',monospace">kcal</text></svg>);}

/* 円グラフ中央に「分子/分母」(摂取kcal/TDEE)を表示するバリエーション。PFCが全て0でも円(空グレーリング)は常に表示する */

function MiniCal({onSel,sel}){
  const today=new Date();
  const[curY,setCurY]=useState(today.getFullYear());
  const[curM,setCurM]=useState(today.getMonth());
  const fd=new Date(curY,curM,1).getDay();
  const dim=new Date(curY,curM+1,0).getDate();
  const cells=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const MN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const DN=["日","月","火","水","木","金","土"];
  const goPrev=()=>{if(curM===0){setCurY(y=>y-1);setCurM(11);}else{setCurM(m=>m-1);}};
  const goNext=()=>{if(curM===11){setCurY(y=>y+1);setCurM(0);}else{setCurM(m=>m+1);}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <button type="button" onClick={goPrev} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#3a3a3a",lineHeight:1}}>‹</button>
      <span style={{fontSize:12,fontWeight:700,color:"#1a1a1a",fontFamily:"'DM Mono',monospace"}}>{curY}年 {MN[curM]}</span>
      <button type="button" onClick={goNext} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#3a3a3a",lineHeight:1}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{DN.map(d=>(<div key={d} style={{textAlign:"center",fontSize:9,color:"#9a9a9a",fontWeight:600,padding:"3px 0"}}>{d}</div>))}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((d,i)=>{
      if(!d)return <div key={i}/>;
      const ds=`${curY}/${String(curM+1).padStart(2,"0")}/${String(d).padStart(2,"0")}`;
      const cellDate=new Date(curY,curM,d);
      const isFut=cellDate>today;
      const isSel=sel===ds;
      return(<button key={i} type="button" disabled={isFut} onClick={()=>onSel(ds)} style={{background:isSel?"#1a1a1a":"none",color:isSel?"#fff":isFut?"#ccc":"#1a1a1a",border:"none",borderRadius:4,padding:"7px 0",cursor:isFut?"default":"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{d}</button>);
    })}</div>
  </div>);
}

      {mSetPicker&&!mSetConfirm&&(<Modal onClose={()=>setMSetPicker(null)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>myセットから読込</p><button onClick={()=>setMSetPicker(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div>
        {/* 一括/個別 トグル */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}><span style={{fontSize:9,color:mSetBulk?"#1a1a1a":"#aaa",fontWeight:mSetBulk?700:400}}>一括入力</span><div onClick={()=>setMSetBulk(v=>!v)} style={{width:44,height:24,borderRadius:12,cursor:"pointer",background:mSetBulk?"#1a1a1a":"#f4a261",position:"relative",transition:"background .2s"}}><div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:mSetBulk?3:23,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.25)"}}/></div><span style={{fontSize:9,color:!mSetBulk?"#1a1a1a":"#aaa",fontWeight:!mSetBulk?700:400}}>個別入力</span></div>
        <p style={{fontSize:10,color:"#7a7a7a",marginBottom:12}}>{mSetBulk?"セットを選んで一括で反映します":"セットを選び、食事をタップしてください"}</p>
        {/* セット選択タブ */}
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto"}}>{mealSets.map((s,si)=>(<button key={si} onClick={()=>setMSetPicker(prev=>({...prev,selSet:si}))} style={{...BS,fontSize:9,padding:"6px 12px",whiteSpace:"nowrap",background:(mSetPicker.selSet??0)===si?"#1a1a1a":"#fff",color:(mSetPicker.selSet??0)===si?"#fff":"#3a3a3a"}}>{s.title||`セット${si+1}`}</button>))}</div>
        {mSetBulk?(
          /* 一括入力: セット選択→選択ボタン */
          <div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>setMSetPicker(null)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#8a8a8a",borderColor:"#ccc",background:"transparent"}}>キャンセル</button><button onClick={()=>{const si=mSetPicker.selSet??0;setMSetConfirm({si,bulk:true,mode:mSetPicker.mode,idx:mSetPicker.idx,setTitle:mealSets[si].title||`セット${si+1}`});}} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#d62828",borderColor:"#d62828"}}>選択</button></div>
        ):(
          /* 個別入力: 食事一覧 */
          <div style={{display:"flex",flexDirection:"column",gap:4}}>{mealSets[mSetPicker.selSet??0]?.meals.map((ml,mi)=>{const mp=parseFloat(ml.p)||0,mf=parseFloat(ml.f)||0,mc=parseFloat(ml.c)||0;const si=mSetPicker.selSet??0;return(<button key={mi} onClick={()=>setMSetConfirm({si,mi,mode:mSetPicker.mode,idx:mSetPicker.idx,label:ml.label,p:mp,f:mf,c:mc,setTitle:mealSets[si].title||`セット${si+1}`,bulk:false})} style={{...BS,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",fontSize:10,width:"100%",textAlign:"left"}}><span style={{fontWeight:600}}>{ml.label}</span><span style={{color:"#6a6a6a",fontSize:9}}>P:{mp}g  F:{mf}g  C:{mc}g</span></button>);})}</div>
        )}
        {!mSetBulk&&<button onClick={()=>setMSetPicker(null)} style={{...BS,width:"100%",padding:"10px",fontSize:10,letterSpacing:2,marginTop:16,color:"#8a8a8a",borderColor:"#ccc",background:"transparent"}}>キャンセル</button>}
      </Modal>)}

      {/* ═══ myセット CONFIRM MODAL ═══ */}
      {mSetConfirm&&(<Modal onClose={()=>setMSetConfirm(null)}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:10}}>読込確認</p>{mSetConfirm.bulk?(<p style={{fontSize:12,color:"#3a3a3a",marginBottom:20}}>「{mSetConfirm.setTitle}」を反映しますか？</p>):(<><p style={{fontSize:12,color:"#3a3a3a",marginBottom:8}}>「{mSetConfirm.setTitle}」の<strong>「{mSetConfirm.label}」</strong>を読み込みますか？</p><div style={{background:"#f8f8f6",borderRadius:4,padding:"10px 12px",marginBottom:20}}><p style={{fontSize:10,color:"#5a5a5a"}}>P: {mSetConfirm.p}g　F: {mSetConfirm.f}g　C: {mSetConfirm.c}g</p></div></>)}<div style={{display:"flex",gap:8}}><button onClick={()=>setMSetConfirm(null)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#8a8a8a",borderColor:"#ccc",background:"transparent"}}>キャンセル</button><button onClick={()=>{if(mSetConfirm.bulk){applyBulkMealSet(mSetConfirm.si,mSetConfirm.mode);}else{applyMealSet(mSetConfirm.si,mSetConfirm.mi,mSetConfirm.mode,mSetConfirm.idx);}setMSetConfirm(null);setMSetPicker(null);}} style={{...BP,flex:1,padding:"10px",fontSize:10,letterSpacing:3,background:"#d62828"}}>はい</button></div></Modal>)}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));root.render(<App />);</script></body></html>
