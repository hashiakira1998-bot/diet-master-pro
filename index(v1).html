function injectGlobalStyles() {
  if (typeof document === "undefined") return;
  if (!document.getElementById("dlp-global-styles")) {
    const style = document.createElement("style");
    style.id = "dlp-global-styles";
    style.textContent = GLOBAL_CSS;
    document.head.appendChild(style);
  }

    const link = document.createElement("link");
    link.id = "dlp-google-fonts";
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap";

}

const calcPFC=(tdee,goal,lean,pPct=30,fPct=25,custom="")=>{let cal=tdee;if(goal==="cut")cal=tdee-500;else if(goal==="bulk")cal=tdee+300;else if(goal==="custom"&&custom){const n=parseFloat(custom);if(!isNaN(n))cal=tdee+n;}const p=pPct?(cal*pPct)/100/4:lean?lean*2.2:(cal*0.3)/4;const f=fPct?(cal*fPct)/100/9:(cal*0.25)/9;const c=Math.max(0,(cal-p*4-f*9)/4);return{calories:Math.round(cal),protein:Math.round(p),fat:Math.round(f),carbs:Math.round(c)};};

/* ═══ COMPONENTS ═══ */
function TrendChart({data,mode,onClickDate,goalLine,issnLine,issnUpper,issnLower,showLines,showIssn=true,chartId="main"}){
  if(!data||!data.length)return(<div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:"#bbb",fontSize:11}}>データなし</div>);
  const label=mode==="weight"?"weight":"fat",unit=mode==="weight"?"kg":"%",step=mode==="weight"?1:0.5,lineColor=mode==="weight"?"#1a1a1a":"#5a7a5a";
  const scrollRef=useRef(null);
  const vals=data.map(d=>d[label]),filled=[];let last=null;
  vals.forEach(v=>{if(v!==null){last=v;filled.push(v);}else filled.push(last);});
  const nonNull=filled.filter(v=>v!==null);
  if(!nonNull.length)return(<div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:"#bbb",fontSize:11}}>データなし</div>);
  const actualMin=Math.min(...nonNull),actualMax=Math.max(...nonNull);
  const actualCenter=(actualMin+actualMax)/2;
  let rangeMin=actualMin,rangeMax=actualMax;
  if(showLines){const allLineVals=[];if(goalLine)goalLine.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(showIssn&&issnLine)issnLine.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(showIssn&&issnUpper)issnUpper.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(showIssn&&issnLower)issnLower.forEach(v=>{if(v>=actualCenter-5&&v<=actualCenter+5)allLineVals.push(v);});if(allLineVals.length){rangeMin=Math.min(rangeMin,...allLineVals);rangeMax=Math.max(rangeMax,...allLineVals);}}
  const axisMin=+(Math.floor(rangeMin/step)*step-step).toFixed(2);
  const axisMax=+(Math.ceil(rangeMax/step)*step+step).toFixed(2);
  const axisRange=axisMax-axisMin||1;
  const YAXIS_W=38,PAD_T=26,PAD_B=34,PAD_R=10,COL_W=52,CHART_H=140;
  const H=PAD_T+CHART_H+PAD_B,SCROLL_W=COL_W*data.length+PAD_R;
  const toX=i=>COL_W*i+COL_W/2;
  const toY=v=>PAD_T+CHART_H-((v-axisMin)/axisRange)*CHART_H;
  const pts=filled.map((v,i)=>`${toX(i)},${toY(v)}`);
  const yLabels=[];for(let v=axisMin;v<=axisMax+0.001;v=+(v+step).toFixed(2))yLabels.push(+v.toFixed(2));
  const getYear=(ds)=>{const p=ds.split("/");return p.length===3?p[0]:"";};
  const clipTop=PAD_T,clipHeight=CHART_H;
  const mkPts=(arr)=>arr?arr.map((w,i)=>`${toX(i)},${toY(w)}`).join(" "):"";
  return(
    <div style={{display:"flex",gap:0,userSelect:"none"}}>
      <svg width={YAXIS_W} height={H} style={{flexShrink:0,display:"block"}}>{yLabels.map((v,i)=>{const y=toY(v);return(<g key={i}><line x1={YAXIS_W-4} y1={y} x2={YAXIS_W} y2={y} stroke="#e0e0de" strokeWidth="1"/><text x={YAXIS_W-6} y={y+4} textAnchor="end" fontSize="9" fill="#9a9a9a" fontFamily="'DM Mono',monospace">{v.toFixed(1)}</text></g>);})}</svg>
      <div ref={scrollRef} style={{flex:1,overflowX:"auto",overflowY:"hidden",WebkitOverflowScrolling:"touch",cursor:"grab"}} onMouseDown={e=>{const el=scrollRef.current;let sX=e.pageX-el.offsetLeft,sL=el.scrollLeft;const mv=ev=>{el.scrollLeft=sL-(ev.pageX-el.offsetLeft-sX);};const up=()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);}} onTouchStart={e=>{const el=scrollRef.current;const sX=e.touches[0].pageX;const sL=el.scrollLeft;const mv=ev=>{el.scrollLeft=sL-(ev.touches[0].pageX-sX);};const up=()=>{el.removeEventListener("touchmove",mv);el.removeEventListener("touchend",up);};el.addEventListener("touchmove",mv,{passive:true});el.addEventListener("touchend",up);}}>
        <svg width={SCROLL_W} height={H} style={{display:"block",minWidth:SCROLL_W}}>
          <defs><linearGradient id={`tg-${chartId}-${mode}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lineColor} stopOpacity="0.12"/><stop offset="100%" stopColor={lineColor} stopOpacity="0"/></linearGradient><clipPath id={`cClip-${chartId}`}><rect x="0" y={clipTop} width={SCROLL_W} height={clipHeight}/></clipPath></defs>
          {yLabels.map((v,i)=>(<line key={i} x1={0} y1={toY(v)} x2={SCROLL_W} y2={toY(v)} stroke="#ebebea" strokeWidth="1"/>))}
          {showLines&&showIssn&&issnUpper&&issnLower&&issnUpper.length>0&&(()=>{const upperPts=issnUpper.map((w,i)=>`${toX(i)},${toY(w)}`);const lowerPts=[...issnLower].map((w,i)=>`${toX(i)},${toY(w)}`).reverse();return(<polygon clipPath={`url(#cClip-${chartId})`} points={[...upperPts,...lowerPts].join(" ")} fill="rgba(255,159,64,0.12)" stroke="none"/>);})()}
          {showLines&&showIssn&&issnLine&&issnLine.length>0&&(<polyline clipPath={`url(#cClip-${chartId})`} points={mkPts(issnLine)} fill="none" stroke="#ff9f40" strokeWidth="2" strokeDasharray="3 3"/>)}
          {showLines&&goalLine&&goalLine.length>0&&(<polyline clipPath={`url(#cClip-${chartId})`} points={mkPts(goalLine)} fill="none" stroke="#6bcf7f" strokeWidth="2" strokeDasharray="4 2"/>)}
          <polygon points={`${toX(0)},${PAD_T+CHART_H} ${pts.join(" ")} ${toX(data.length-1)},${PAD_T+CHART_H}`} fill={`url(#tg-${chartId}-${mode})`}/>
          <polyline points={pts.join(" ")} fill="none" stroke={lineColor} strokeWidth="2" strokeLinejoin="round"/>
          {data.map((d,i)=>{const v=d[label],fv=filled[i],cx=toX(i),cy=toY(fv),has=v!==null;return(
            <g key={i} style={{cursor:has?"pointer":"default"}} onClick={()=>has&&onClickDate&&onClickDate(d)}>
              <rect x={cx-26} y={H-PAD_B} width={52} height={PAD_B} fill="transparent"/><text x={cx} y={H-16} textAnchor="middle" fontSize="8" fill={has?"#2a2a2a":"#ccc"} fontFamily="'DM Mono',monospace" fontWeight={has?"600":"400"}>{fmtShort(d.date)}</text>{(i===0||getYear(d.date)!==(i>0?getYear(data[i-1].date):""))&&(<text x={cx} y={H-5} textAnchor="middle" fontSize="7" fill="#f4a261" fontFamily="'DM Mono',monospace" fontWeight="700">{getYear(d.date)}</text>)}
              <circle cx={cx} cy={cy} r={has?4:3} fill="#fff" stroke={has?lineColor:"#ccc"} strokeWidth="2"/>{has&&(<text x={cx} y={cy-10} textAnchor="middle" fontSize="8" fontWeight="700" fill={lineColor} fontFamily="'DM Mono',monospace">{v.toFixed(1)}</text>)}{d.hicarb&&(<text x={cx} y={cy+16} textAnchor="middle" fontSize="7" fontWeight="700" fill="#ff6b35" fontFamily="'DM Mono',monospace">HC</text>)}
            </g>);})}
          {showLines&&(<g transform={`translate(${SCROLL_W-80},${PAD_T+4})`}><rect x="-6" y="-8" width="82" height={showIssn?90:52} rx="4" fill="rgba(255,255,255,0.85)"/><line x1="0" y1="4" x2="20" y2="4" stroke="#1a1a1a" strokeWidth="2"/><text x="24" y="8" fontSize="7" fill="#1a1a1a" fontWeight="600" fontFamily="'DM Mono',monospace">実測</text><line x1="0" y1="22" x2="20" y2="22" stroke="#6bcf7f" strokeWidth="2" strokeDasharray="4 2"/><text x="24" y="26" fontSize="7" fill="#6bcf7f" fontWeight="600" fontFamily="'DM Mono',monospace">目標</text>{showIssn&&(<><line x1="0" y1="40" x2="20" y2="40" stroke="#ff9f40" strokeWidth="2" strokeDasharray="3 3"/><text x="24" y="44" fontSize="7" fill="#ff9f40" fontWeight="600" fontFamily="'DM Mono',monospace">ISSN 0.7%/週</text><rect x="0" y="54" width="20" height="10" rx="2" fill="rgba(255,159,64,0.25)" stroke="none"/><text x="24" y="62" fontSize="7" fill="#ff9f40" fontWeight="600" fontFamily="'DM Mono',monospace">推奨 0.5-1.0%</text></>)}</g>)}
        </svg>
      </div>
    </div>);
}

function MacroRing({protein,fat,carbs}){const t=protein*4+fat*9+carbs*4;if(!t)return null;const pP=(protein*4)/t,pF=(fat*9)/t;const R=48,cx=56,cy=56,sw=11,circ=2*Math.PI*R;const segs=[{pct:pP,c:"#1a1a1a"},{pct:pF,c:"#6a6a6a"},{pct:1-pP-pF,c:"#c8c8c6"}];let off=0;return(<svg width="112" height="112" style={{flexShrink:0}}><circle cx={cx} cy={cy} r={R} fill="none" stroke="#ebebea" strokeWidth={sw}/>{segs.map((s,i)=>{const dash=s.pct*circ;const el=(<circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={s.c} strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off*circ} style={{transform:"rotate(-90deg)",transformOrigin:`${cx}px ${cy}px`}}/>);off+=s.pct;return el;})}<text x={cx} y={cy-5} textAnchor="middle" fill="#1a1a1a" fontSize="13" fontWeight="600" fontFamily="'DM Mono',monospace">{Math.round(t)}</text><text x={cx} y={cy+11} textAnchor="middle" fill="#6a6a6a" fontSize="9" fontFamily="'DM Mono',monospace">kcal</text></svg>);}

function MiniCal({onSel,sel}){
  const today=new Date();
  const[curY,setCurY]=useState(today.getFullYear());
  const[curM,setCurM]=useState(today.getMonth());
  const fd=new Date(curY,curM,1).getDay();
  const dim=new Date(curY,curM+1,0).getDate();
  const cells=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const MN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const DN=["日","月","火","水","木","金","土"];
  const goPrev=()=>{if(curM===0){setCurY(y=>y-1);setCurM(11);}else{setCurM(m=>m-1);}};
  const goNext=()=>{if(curM===11){setCurY(y=>y+1);setCurM(0);}else{setCurM(m=>m+1);}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <button type="button" onClick={goPrev} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#3a3a3a",lineHeight:1}}>‹</button>
      <span style={{fontSize:12,fontWeight:700,color:"#1a1a1a",fontFamily:"'DM Mono',monospace"}}>{curY}年 {MN[curM]}</span>
      <button type="button" onClick={goNext} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#3a3a3a",lineHeight:1}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{DN.map(d=>(<div key={d} style={{textAlign:"center",fontSize:9,color:"#9a9a9a",fontWeight:600,padding:"3px 0"}}>{d}</div>))}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((d,i)=>{
      if(!d)return <div key={i}/>;
      const ds=`${curY}/${String(curM+1).padStart(2,"0")}/${String(d).padStart(2,"0")}`;
      const cellDate=new Date(curY,curM,d);

  const BP={fontFamily:"'DM Mono',monospace",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontWeight:600};
  const BS={fontFamily:"'DM Mono',monospace",background:"#fff",color:"#3a3a3a",border:"1px solid #d0d0ce",borderRadius:4,cursor:"pointer",fontWeight:600};

  const TABS=[{id:"dashboard",l:"DASH"},{id:"calc",l:"CALC"},{id:"supps",l:"SUPPS"},{id:"advisor",l:"ADVISOR"}];

  return(
    <div style={{maxWidth:540,margin:"0 auto",minHeight:"100%",display:"flex",flexDirection:"column",background:"#f4f4f2"}}>
      {/* HEADER */}
      <header style={{background:"#1a1a1a",padding:"18px 22px 14px",flexShrink:0}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#fff",letterSpacing:2}}>Diet Logic <span style={{color:"#6a6a6a"}}>Pro</span></h1>
        <p style={{fontSize:8,letterSpacing:6,color:"#5a5a5a",marginTop:4}}>EVIDENCE — BASED BODY RECOMPOSITION</p>
      </header>
      {/* TAB BAR */}
      <nav className="safe-b" style={{display:"flex",background:"#fff",borderBottom:"1px solid #e0e0de",position:"sticky",top:0,zIndex:100,flexShrink:0}}>
        {TABS.map(t=>(<button key={t.id} className="nb" onClick={()=>setTab(t.id)} style={{flex:1,padding:"14px 8px 12px",color:tab===t.id?"#1a1a1a":"#b0b0ae",fontWeight:tab===t.id?700:400,borderBottom:tab===t.id?"2px solid #1a1a1a":"2px solid transparent",transition:"all .15s"}}>{t.l}</button>))}
      </nav>
      {/* MAIN */}
      <main style={{flex:1,padding:"20px 16px 32px",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {/* ══════ DASHBOARD ══════ */}
        {tab==="dashboard"&&(<div className="fu">
          {/* TODAY'S LOG */}
          <Card style={{marginBottom:14}}><SL>TODAY'S LOG</SL><div style={{display:"flex",gap:10,alignItems:"flex-end"}}><div style={{flex:1}}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>体重 (kg)</p><input type="text" inputMode="decimal" placeholder={W.toString()} value={tw} onChange={e=>setTw(e.target.value.replace(/[^0-9.]/g,""))} style={{...IB,fontSize:20,fontWeight:700,padding:"6px 10px"}}/></div><div style={{flex:1}}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>体脂肪率 (%)</p><input type="text" inputMode="decimal" placeholder={FP.toString()} value={tf} onChange={e=>setTf(e.target.value.replace(/[^0-9.]/g,""))} style={{...IB,fontSize:20,fontWeight:700,padding:"6px 10px"}}/></div><div style={{display:"flex",flexDirection:"column",gap:6}}><button onClick={()=>setMCloth(true)} style={{...BS,fontSize:9,letterSpacing:2,padding:"8px 14px"}}>詳細</button><button onClick={()=>{if(!tw&&!tf)return;const n=new Date();const ds=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,"0")}/${String(n.getDate()).padStart(2,"0")}`;record(ds,tw,tf);setTw("");setTf("");}} style={{...BP,fontSize:9,letterSpacing:2,padding:"8px 14px",opacity:(tw||tf)?1:0.35}}>記録</button></div></div></Card>
          {/* WEIGHT TREND */}
          <Card style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><SL>{chart==="weight"?"WEIGHT TREND":"BODY FAT TREND"}</SL><div style={{display:"flex",gap:8,alignItems:"center",marginTop:-14}}><button onClick={()=>{setCalDate("");setCalW("");setCalF("");setMCal(true);}} style={{background:"none",border:"1px solid #e0e0de",borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:14,lineHeight:1,color:"#3a3a3a"}}>📅</button><button onClick={()=>setChart(m=>(m==="weight"?"fat":"weight"))} style={{...BS,fontSize:9,letterSpacing:2,padding:"5px 11px"}}>切換え</button></div></div><TrendChart chartId="dash" data={data} mode={chart} onClickDate={d=>{if(d.weight===null&&d.fat===null)return;setEditTgt({...d});setMEdit(true);}} goalLine={chart==="weight"?goalWeightsFull:null} issnLine={chart==="weight"?issnWeightsFull:null} issnUpper={chart==="weight"?issnUpperFull:null} issnLower={chart==="weight"?issnLowerFull:null} showLines={chart==="weight"} showIssn={showIssnLine}/><p style={{fontSize:9,color:"#bbb",marginTop:8,textAlign:"right"}}>← スクロール可 ／ 記録日をタップで修正</p></Card>
        </div>)}

        {/* ══════ CALC ══════ */}
        {tab==="calc"&&(<div className="fu">
          {/* PROFILE */}
          <Card style={{marginBottom:14}}><SL>PROFILE</SL><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>{[{l:"身長(cm)",k:"height"},{l:"年齢",k:"age"}].map(f=>(<div key={f.k}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>{f.l}</p><input type="text" inputMode="numeric" value={prof[f.k]} onChange={e=>setProf(p=>({...p,[f.k]:e.target.value.replace(/[^0-9]/g,"")}))} style={{...IB,fontWeight:700}}/></div>))}<div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>性別</p><select value={prof.sex} onChange={e=>setProf(p=>({...p,sex:e.target.value}))} style={{...IB}}><option value="male">男性</option><option value="female">女性</option></select></div><div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>目標</p><select value={prof.goal} onChange={e=>setProf(p=>({...p,goal:e.target.value}))} style={{...IB}}><option value="cut">カット (−500)</option><option value="maintain">維持</option><option value="bulk">バルク (+300)</option><option value="custom">任意入力</option></select></div>{prof.goal==="custom"&&(<div style={{gridColumn:"span 2"}}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>カロリー増減（kcal/day）</p><input type="text" value={prof.goalCustom} placeholder="例: -300 or +200" onChange={e=>setProf(p=>({...p,goalCustom:e.target.value}))} style={{...IB,fontWeight:700}}/></div>)}</div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:8}}>活動量</p><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{Object.entries(ACT).map(([k,v])=>(<button key={k} onClick={()=>setProf(p=>({...p,activity:k}))} style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,padding:"6px 12px",borderRadius:4,border:"2px solid",cursor:"pointer",fontWeight:600,background:prof.activity===k?"#1a1a1a":"#fff",color:prof.activity===k?"#fff":"#2a2a2a",borderColor:prof.activity===k?"#1a1a1a":"#e0e0de"}}>{v.label}</button>))}</div></Card>
          {/* GOAL */}
          <Card style={{marginBottom:14}}><SL>GOAL</SL><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}><div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>START DATE</p><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={{...IB,fontSize:12}}/></div><div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>TARGET DATE</p><input type="date" value={gd} onChange={e=>setGd(e.target.value)} style={{...IB,fontSize:12}}/></div><div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>START WEIGHT</p><div style={{display:"flex",alignItems:"center",gap:8}}><input type="text" inputMode="decimal" value={startWeight} onChange={e=>setStartWeight(e.target.value.replace(/[^0-9.]/g,""))} style={{...IB,width:90,fontSize:18,fontWeight:700,textAlign:"center"}}/><span style={{fontSize:13,color:"#5a5a5a",fontWeight:600}}>kg</span></div></div><div><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>TARGET WEIGHT</p><div style={{display:"flex",alignItems:"center",gap:8}}><input type="text" inputMode="decimal" value={gw} onChange={e=>setGw(parseFloat(e.target.value.replace(/[^0-9.]/g,""))||0)} style={{...IB,width:90,fontSize:18,fontWeight:700,textAlign:"center"}}/><span style={{fontSize:13,color:"#5a5a5a",fontWeight:600}}>kg</span></div><p style={{fontSize:12,color:"#3a3a3a",marginTop:8,fontWeight:600}}>残り {Math.abs(W-gw).toFixed(1)} kg ({SW>TW?"減量":SW<TW?"増量":"維持"})</p></div></div><div style={{borderTop:"1px solid #ebebea",paddingTop:14}}><p style={{fontSize:9,letterSpacing:3,color:"#8a8a8a",fontWeight:500,marginBottom:10}}>目標ペース（機械計算）</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[{l:"月",v:`${lossPerMonth} kg/月`},{l:"週",v:`${lossPerWeek} kg/週`}].map(p=>(<div key={p.l} style={{background:"#f8f8f6",borderRadius:4,padding:"10px 8px",textAlign:"center"}}><p style={{fontSize:8,color:"#8a8a8a",letterSpacing:2,marginBottom:6}}>{p.l}</p><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a",lineHeight:1.2}}>{p.v}</p></div>))}</div></div></Card>
          {/* STATUS (compact with INFO button) */}
          <Card style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><SL>STATUS</SL><button onClick={()=>setMInfo(true)} style={{...BS,fontSize:8,letterSpacing:2,padding:"5px 12px",marginTop:-14}}>INFO</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,textAlign:"center"}}>{[{l:"体重",v:W+" kg"},{l:"体脂肪",v:FP+"%"},{l:"脂肪量",v:bodyFatKg+"kg"},{l:"除脂肪",v:leanMass+"kg"}].map(s=>(<div key={s.l}><p style={{fontSize:8,color:"#aaa",marginBottom:2}}>{s.l}</p><p style={{fontSize:12,fontWeight:700,color:"#2a2a2a"}}>{s.v}</p></div>))}</div></Card>
          {/* DAILY MACROS (moved from DASH) */}
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><SL>DAILY MACROS</SL><button onClick={()=>setMacroView(v=>v==="pct"?"gram":"pct")} style={{...BS,fontSize:8,letterSpacing:2,padding:"5px 12px",marginTop:-14}}>{macroView==="pct"?"g 入力":"% 入力"}</button></div>
            {macroView==="pct"?(
              <>
                {/* %入力モード: %入力欄 → 円グラフ + g表示 */}
                <div style={{marginBottom:16}}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:10}}>PFCバランス（%）入力</p>{pfcErr&&<p style={{color:"#e63946",fontSize:11,fontWeight:600,marginBottom:8}}>合計が100%になるように入力して下さい。</p>}<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{[{k:"p",l:"P %"},{k:"f",l:"F %"},{k:"c",l:"C %"}].map(x=>(<div key={x.k}><p style={{fontSize:9,color:"#6a6a6a",marginBottom:4}}>{x.l}</p><input type="text" inputMode="decimal" value={pfcPct[x.k]} placeholder="—" onChange={e=>setPfcPct(p=>({...p,[x.k]:e.target.value.replace(/[^0-9.]/g,"")}))} style={{...IB,fontSize:13,fontWeight:700,textAlign:"center"}}/></div>))}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:20}}><MacroRing protein={aPFC.protein} fat={aPFC.fat} carbs={aPFC.carbs}/><div style={{flex:1}}>{[{l:"PROTEIN",v:aPFC.protein+"g",sub:pfcBalance.p+"%",c:"#1a1a1a"},{l:"FAT",v:aPFC.fat+"g",sub:pfcBalance.f+"%",c:"#6a6a6a"},{l:"CARBS",v:aPFC.carbs+"g",sub:pfcBalance.c+"%",c:"#b8b8b6"}].map(m=>(<div key={m.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:m.c}}/><span style={{fontSize:9,letterSpacing:3,color:"#5a5a5a",fontWeight:600}}>{m.l}</span></div><div style={{textAlign:"right"}}><span style={{fontSize:18,fontWeight:700,color:"#1a1a1a"}}>{m.v}</span><span style={{fontSize:10,color:"#8a8a8a",marginLeft:6}}>{m.sub}</span></div></div>))}</div></div>
              </>
            ):(
              <>
                {/* g入力モード: g入力欄 → 円グラフ + %算出表示 */}
                <div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600}}>PFCバランス（g）入力</p><button onClick={()=>setGramTargetMode(v=>!v)} style={{...BS,fontSize:7,letterSpacing:1,padding:"4px 8px",background:gramTargetMode?"#1a1a1a":"#fff",color:gramTargetMode?"#fff":"#3a3a3a"}}>{gramTargetMode?"目標CAL対比":"PFC内比率"}</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{[{k:"p",l:"P (g)"},{k:"f",l:"F (g)"},{k:"c",l:"C (g)"}].map(x=>(<div key={x.k}><p style={{fontSize:9,color:"#6a6a6a",marginBottom:4}}>{x.l}</p><input type="text" inputMode="decimal" value={pfcGram[x.k]} placeholder="0" onChange={e=>setPfcGram(p=>({...p,[x.k]:e.target.value.replace(/[^0-9.]/g,"")}))} style={{...IB,fontSize:13,fontWeight:700,textAlign:"center"}}/></div>))}</div></div>
                {(()=>{
                  const usePct=gramTargetMode?gramTargetPct:gramPct;
                  const items=[{l:"PROTEIN",v:usePct.p+"%",sub:gP+"g",c:"#1a1a1a",raw:parseFloat(usePct.p)},{l:"FAT",v:usePct.f+"%",sub:gF+"g",c:"#6a6a6a",raw:parseFloat(usePct.f)},{l:"CARBS",v:usePct.c+"%",sub:gC+"g",c:"#b8b8b6",raw:parseFloat(usePct.c)}];
                  return(<div style={{display:"flex",alignItems:"center",gap:20}}><MacroRing protein={gP} fat={gF} carbs={gC}/><div style={{flex:1}}>{items.map(m=>(<div key={m.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:m.c}}/><span style={{fontSize:9,letterSpacing:3,color:"#5a5a5a",fontWeight:600}}>{m.l}</span></div><div style={{textAlign:"right"}}><span style={{fontSize:18,fontWeight:700,color:gramTargetMode?(m.raw>100?"#e63946":"#1a1a1a"):"#1a1a1a"}}>{m.v}</span><span style={{fontSize:10,color:"#8a8a8a",marginLeft:6}}>{m.sub}</span></div></div>))}<div style={{borderTop:"1px solid #ebebea",paddingTop:8,marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div>{gTotal>0&&gramTargetMode?(<span style={{fontSize:10,color:gramTargetSum<=100.1?"#2a9d8f":"#e63946",fontWeight:600}}>目標対比 {gramTargetSum.toFixed(1)}%<span style={{fontSize:8,color:"#8a8a8a",marginLeft:4}}>/ {tgtCal} kcal</span></span>):(()=>{const s=parseFloat(gramPct.p)+parseFloat(gramPct.f)+parseFloat(gramPct.c);return gTotal>0?(<span style={{fontSize:10,color:s<=100.1?"#2a9d8f":"#e63946",fontWeight:600}}>合計 {s.toFixed(1)}%</span>):null;})()}</div><div><span style={{fontSize:11,fontWeight:700,color:"#1a1a1a"}}>{Math.round(gTotal)}</span><span style={{fontSize:9,color:"#8a8a8a",marginLeft:4}}>kcal</span></div></div></div></div>);
                })()}
              </>
            )}
          </Card>
          {/* CALCULATION MODE */}
          <Card style={{marginBottom:14}}><SL>CALCULATION MODE</SL><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>{[{id:"auto",l:"AUTO",s:"ISSN/NSCA"},{id:"manual",l:"MANUAL",s:"全手入力"},{id:"semi",l:"SEMI",s:"微調整"}].map(m=>(<div key={m.id} onClick={()=>setCalcMode(m.id)} style={{border:`2px solid ${calcMode===m.id?"#1a1a1a":"#e0e0de"}`,background:calcMode===m.id?"#1a1a1a":"#fff",borderRadius:5,padding:"14px 10px",textAlign:"center",cursor:"pointer"}}><p style={{fontSize:10,letterSpacing:3,fontWeight:700,color:calcMode===m.id?"#fff":"#2a2a2a"}}>{m.l}</p><p style={{fontSize:9,color:calcMode===m.id?"#aaa":"#8a8a8a",marginTop:4}}>{m.s}</p></div>))}</div></Card>
          {/* MEAL SET */}
          <Card style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><SL>食事myセット</SL><button onClick={()=>setMMealSet(true)} style={{...BS,fontSize:9,letterSpacing:2,padding:"6px 14px",marginTop:-14}}>OPEN</button></div></Card>
          {/* AUTO */}
          {calcMode==="auto"&&(<Card><SL>AUTO MODE</SL><div style={{marginBottom:14,padding:"14px",background:"#f8f8f6",borderRadius:6,border:"1px solid #e8e8e6"}}><p style={{fontSize:11,fontWeight:700,color:"#1a1a1a",marginBottom:10}}>毎食（目安）</p><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>{[{k:"p",l:"P (g)",v:mealTarget.protein},{k:"f",l:"F (g)",v:mealTarget.fat},{k:"c",l:"C (g)",v:mealTarget.carbs}].map(m=>(<div key={m.k}><p style={{fontSize:9,color:"#6a6a6a",marginBottom:4}}>{m.l}</p><div style={{...IB,fontSize:14,fontWeight:700,textAlign:"center",background:"#ebebea",color:"#6a6a6a",cursor:"default"}}>{m.v}</div></div>))}</div></div><div style={{padding:"14px",background:"#1a1a1a",borderRadius:6}}><p style={{fontSize:11,fontWeight:700,color:"#fff",marginBottom:10}}>一日分</p><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>{[{l:"P",v:aFC.protein,u:"g"},{l:"F",v:aFC.fat,u:"g"},{l:"C",v:aFC.carbs,u:"g"},{l:"CAL",v:aFC.calories,u:"kcal"}].map(x=>(<div key={x.l} style={{textAlign:"center"}}><p style={{fontSize:8,color:"#7a7a7a",marginBottom:4}}>{x.l}</p><p style={{fontSize:16,fontWeight:700,color:"#fff"}}>{x.v}</p><p style={{fontSize:8,color:"#6a6a6a"}}>{x.u}</p></div>))}</div><div style={{marginTop:12,borderTop:"1px solid #3a3a3a",paddingTop:10}}><p style={{fontSize:10,color:aFC.calories>tdee?"#ff6b6b":"#6bcf7f",fontWeight:600,textAlign:"center"}}>TDEE差分: {aFC.calories>tdee?"+":""}{(aFC.calories-tdee).toFixed(0)} kcal</p></div></div></Card>)}
          {/* MANUAL */}
          {calcMode==="manual"&&(<Card><SL>MANUAL INPUT</SL>

            {paceMode==="auto"&&(<div style={{background:"#f8f8f6",borderRadius:4,padding:"12px 14px"}}><p style={{fontSize:9,color:"#7a7a7a",marginBottom:6}}>現在のBMI: <strong style={{color:"#1a1a1a"}}>{calcBMI(W,heightNum).toFixed(1)}</strong></p><p style={{fontSize:9,color:"#7a7a7a"}}>適用ペース: <strong style={{color:"#1a1a1a"}}>{calcBMI(W,heightNum)>=25?"0.75":"0.50"} kg/週</strong><span style={{fontSize:8,color:"#aaa",marginLeft:6}}>({calcBMI(W,heightNum)>=25?"BMI≥25":"BMI<25"})</span></p></div>)}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12,padding:"8px 0",borderTop:"1px solid #ebebea"}}><button onClick={()=>setWeekOffset(o=>o-1)} style={{...BS,fontSize:14,padding:"6px 14px",lineHeight:1}}>‹</button><div style={{textAlign:"center"}}><p style={{fontSize:10,fontWeight:700,color:"#1a1a1a"}}>{fmtDS(currentWeek.start)} — {fmtDS(currentWeek.end)}</p><p style={{fontSize:8,color:"#8a8a8a",letterSpacing:2,marginTop:2}}>{weekOffset===0?"今週":weekOffset===-1?"先週":`${Math.abs(weekOffset)}週前`}</p></div><button onClick={()=>{if(weekOffset<0)setWeekOffset(o=>o+1);}} disabled={weekOffset>=0} style={{...BS,fontSize:14,padding:"6px 14px",lineHeight:1,opacity:weekOffset>=0?0.3:1,cursor:weekOffset>=0?"not-allowed":"pointer"}}>›</button></div>

          <Card><SL>CONDITIONING PILLARS</SL><div style={{marginBottom:18}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}><div><span style={{fontSize:10,letterSpacing:2,color:"#1a1a1a",fontWeight:700}}>SLEEP</span><span style={{fontSize:10,color:"#7a7a7a",marginLeft:8}}>コルチゾール抑制・GH分泌最適化</span></div><span style={{fontSize:11,color:"#2a2a2a",fontWeight:700,whiteSpace:"nowrap"}}>7/9 hr</span></div><div style={{height:5,background:"#ebebea",borderRadius:3}}><div style={{height:"100%",width:"78%",background:"#1a1a1a",borderRadius:3}}/></div><p style={{fontSize:10,color:"#7a7a7a",marginTop:6}}>※ Google Fit 連携予定</p></div><div><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}><div><span style={{fontSize:10,letterSpacing:2,color:"#1a1a1a",fontWeight:700}}>HI-CARB CYCLE</span><span style={{fontSize:10,color:"#7a7a7a",marginLeft:8}}>レプチン・代謝適応対策</span></div><span style={{fontSize:11,color:"#2a2a2a",fontWeight:700,whiteSpace:"nowrap"}}>{hicarbDays}/7</span></div><div style={{height:5,background:"#ebebea",borderRadius:3}}><div style={{height:"100%",width:`${Math.min((hicarbDays/7)*100,100)}%`,background:"#3a3a3a",borderRadius:3}}/></div><button onClick={resetHicarb} style={{...BS,fontSize:9,letterSpacing:2,padding:"5px 10px",marginTop:10}}>リセット</button></div></Card>

      {/* ══════ MODALS ══════ */}
      {mCloth&&(<Modal onClose={()=>setMCloth(false)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}><div><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>被服重量プリセット</p><p style={{fontSize:10,color:"#7a7a7a",marginTop:3}}>体重計に乗るときに差し引くグラム数</p></div><button onClick={()=>setMCloth(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div>{cloth.map((c,i)=>(<div key={i} style={{marginBottom:16,padding:"14px",background:"#f8f8f6",borderRadius:6,border:"1px solid #ebebea"}}><p style={{fontSize:8,letterSpacing:3,color:"#8a8a8a",fontWeight:500,marginBottom:8}}>プリセット {i+1}</p><div style={{display:"flex",gap:8,marginBottom:6}}><input type="text" value={c.name} placeholder="服装の名前" onChange={e=>setCloth(prev=>prev.map((x,j)=>(j===i?{...x,name:e.target.value}:x)))} style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500,color:"#1a1a1a",background:"#fff",border:"1px solid #e0e0de",borderRadius:4,padding:"7px 10px",flex:3,outline:"none"}}/><div style={{display:"flex",alignItems:"center",gap:4,flex:"0 0 80px"}}><input type="text" inputMode="numeric" value={c.gram} placeholder="例:300" onChange={e=>setCloth(prev=>prev.map((x,j)=>(j===i?{...x,gram:e.target.value.replace(/[^0-9]/g,"")}:x)))} style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:"#1a1a1a",background:"#fff",border:"1px solid #e0e0de",borderRadius:4,padding:"7px 8px",width:"100%",outline:"none",textAlign:"right"}}/><span style={{fontSize:11,color:"#5a5a5a",fontWeight:600}}>g</span></div></div>{c.gram&&(<p style={{fontSize:11,color:"#2a2a2a",fontWeight:600}}>→ 表示体重から <strong style={{color:"#1a1a1a"}}>{(parseInt(c.gram)/1000).toFixed(3)} kg</strong> を差し引く</p>)}</div>))}<button onClick={()=>setMCloth(false)} style={{...BP,width:"100%",padding:"11px",fontSize:10,letterSpacing:3,marginTop:4}}>SAVE & CLOSE</button></Modal>)}

      {mEdit&&editTgt&&(<Modal onClose={()=>setMEdit(false)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>記録を修正</p><p style={{fontSize:12,color:"#6a6a6a",marginTop:2}}>{editTgt.date}</p></div><button onClick={()=>setMEdit(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>{[{l:"体重 (kg)",v:editTgt.weight??"",s:v=>setEditTgt(t=>({...t,weight:v}))},{l:"体脂肪率 (%)",v:editTgt.fat??"",s:v=>setEditTgt(t=>({...t,fat:v}))}].map(f=>(<div key={f.l}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>{f.l}</p><input type="text" inputMode="decimal" value={f.v} onChange={e=>f.s(e.target.value.replace(/[^0-9.]/g,""))} style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:"#1a1a1a",background:"#f8f8f6",border:"1px solid #e0e0de",borderRadius:4,padding:"8px 12px",width:"100%",outline:"none"}}/></div>))}</div><div style={{display:"flex",gap:8}}><button onClick={()=>setMEdit(false)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2}}>キャンセル</button><button onClick={()=>{record(editTgt.date,editTgt.weight,editTgt.fat,editTgt.hicarb);setMEdit(false);}} style={{...BP,flex:2,padding:"10px",fontSize:10,letterSpacing:3}}>UPDATE</button></div></Modal>)}

      {mCal&&(<Modal onClose={()=>setMCal(false)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>過去の日付に記録</p><p style={{fontSize:10,color:"#7a7a7a",marginTop:3}}>日付を選択して入力</p></div><button onClick={()=>setMCal(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div><MiniCal sel={calDate} onSel={ds=>{setCalDate(ds);const ex=data.find(d=>d.date===ds);setCalW(ex?.weight!=null?String(ex.weight):"");setCalF(ex?.fat!=null?String(ex.fat):"");}}/>{calDate&&(<div style={{marginTop:20,borderTop:"1px solid #ebebea",paddingTop:20}}><p style={{fontSize:11,fontWeight:700,color:"#1a1a1a",marginBottom:14}}>{calDate} の記録</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>{[{l:"体重 (kg)",v:calW,s:setCalW},{l:"体脂肪率 (%)",v:calF,s:setCalF}].map(f=>(<div key={f.l}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>{f.l}</p><input type="text" inputMode="decimal" value={f.v} placeholder="—" onChange={e=>f.s(e.target.value.replace(/[^0-9.]/g,""))} style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:"#1a1a1a",background:"#f8f8f6",border:"1px solid #e0e0de",borderRadius:4,padding:"8px 12px",width:"100%",outline:"none"}}/></div>))}</div><div style={{display:"flex",gap:8}}><button onClick={()=>setMCal(false)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2}}>キャンセル</button><button onClick={()=>{if(!calW&&!calF)return;record(calDate,calW,calF);setMCal(false);}} style={{...BP,flex:2,padding:"10px",fontSize:10,letterSpacing:3}}>RECORD</button></div></div>)}</Modal>)}

      {mMealSet&&(<Modal onClose={()=>setMMealSet(false)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>食事myセット</p><div style={{display:"flex",gap:8}}><button onClick={()=>{if(mealSets.length>=10)return;setMealSets([...mealSets,{title:"新規",meals:JSON.parse(JSON.stringify(EMPTY_MEALS))}]);setCurSetIdx(mealSets.length);}} style={{...BS,fontSize:9,letterSpacing:2,padding:"6px 10px"}}>+ 追加</button><button onClick={()=>setMMealSet(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div></div><div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto"}}>{mealSets.map((s,i)=>(<button key={i} onClick={()=>setCurSetIdx(i)} style={{...BS,fontSize:9,padding:"6px 12px",whiteSpace:"nowrap",background:curSetIdx===i?"#1a1a1a":"#fff",color:curSetIdx===i?"#fff":"#3a3a3a"}}>{s.title}</button>))}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{flex:1}}><p style={{fontSize:10,color:"#5a5a5a",fontWeight:600,marginBottom:6}}>TITLE</p><input type="text" value={mealSets[curSetIdx].title} onChange={e=>{const n=[...mealSets];n[curSetIdx].title=e.target.value;setMealSets(n);}} style={{...IB}}/></div><button onClick={()=>{setResetTgtIdx(curSetIdx);setMResetConfirm(true);}} style={{...BS,fontSize:9,letterSpacing:2,padding:"6px 10px",marginLeft:10,color:"#d62828",borderColor:"#d62828",marginTop:20}}>項目リセット</button></div>{mealSets[curSetIdx].meals.map((m,j)=>{const mp=parseFloat(m.p)||0,mf=parseFloat(m.f)||0,mc=parseFloat(m.c)||0;const mCal2=Math.round(mp*4+mf*9+mc*4);return(<div key={j} style={{marginBottom:14,padding:"12px",background:"#f8f8f6",borderRadius:4}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>{m.editable?(<input type="text" value={m.label} onChange={e=>{const n=[...mealSets];n[curSetIdx].meals[j].label=e.target.value;setMealSets(n);}} style={{fontSize:10,fontWeight:600,color:"#1a1a1a",background:"transparent",border:"none",outline:"none",fontFamily:"'DM Mono',monospace"}}/>):(<p style={{fontSize:10,fontWeight:600,color:"#1a1a1a"}}>{m.label}</p>)}<p style={{fontSize:8,color:"#7a7a7a"}}>{m.labelEn}</p></div><textarea value={m.desc} onChange={e=>{const n=[...mealSets];n[curSetIdx].meals[j].desc=e.target.value;setMealSets(n);}} placeholder="食事内容（改行可）" rows={3} style={{...IB,fontSize:11,minHeight:60,resize:"vertical",marginBottom:8}}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:6}}>{[{k:"p",l:"P (g)"},{k:"f",l:"F (g)"},{k:"c",l:"C (g)"}].map(x=>(<div key={x.k}><p style={{fontSize:9,color:"#6a6a6a",marginBottom:4}}>{x.l}</p><input type="text" inputMode="decimal" value={m[x.k]} placeholder="0" onChange={e=>{const n=[...mealSets];n[curSetIdx].meals[j][x.k]=e.target.value.replace(/[^0-9.]/g,"");setMealSets(n);}} style={{...IB,fontSize:13,fontWeight:700,textAlign:"center"}}/></div>))}</div><div style={{background:"#ebebea",borderRadius:3,padding:"6px 10px",textAlign:"right"}}><span style={{fontSize:10,color:"#5a5a5a"}}>kcal: </span><span style={{fontSize:14,fontWeight:700,color:"#1a1a1a"}}>{mCal2}</span></div></div>);})}<div style={{background:"#1a1a1a",borderRadius:6,padding:"14px 16px",marginBottom:12}}><p style={{fontSize:8,letterSpacing:4,color:"#7a7a7a",marginBottom:8}}>ACTIVE CALORIES (合計)</p><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>{[{l:"CAL",v:mealSetTotals.cal,u:"kcal"},{l:"P",v:mealSetTotals.p,u:"g"},{l:"F",v:mealSetTotals.f,u:"g"},{l:"C",v:mealSetTotals.c,u:"g"}].map(x=>(<div key={x.l} style={{textAlign:"center"}}><p style={{fontSize:8,color:"#7a7a7a"}}>{x.l}</p><p style={{fontSize:18,fontWeight:700,color:"#fff"}}>{Math.round(x.v)}</p><p style={{fontSize:8,color:"#6a6a6a"}}>{x.u}</p></div>))}</div><div style={{marginTop:10,borderTop:"1px solid #3a3a3a",paddingTop:8}}><p style={{fontSize:10,color:mealSetTotals.cal>tdee?"#ff6b6b":"#6bcf7f",fontWeight:600,textAlign:"center"}}>TDEE差分: {mealSetTotals.cal>tdee?"+":""}{(mealSetTotals.cal-tdee).toFixed(0)} kcal</p></div></div><div style={{display:"flex",gap:8,marginTop:16}}><button onClick={()=>{if(mealSets.length<=1)return;setDelTgtIdx(curSetIdx);setMDelConfirm(true);}} disabled={mealSets.length<=1} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:mealSets.length<=1?"#aaa":"#d62828",borderColor:mealSets.length<=1?"#ccc":"#d62828",opacity:mealSets.length<=1?0.5:1,cursor:mealSets.length<=1?"not-allowed":"pointer"}}>削除</button><button onClick={()=>setMMealSet(false)} style={{...BP,flex:2,padding:"10px",fontSize:10,letterSpacing:3}}>SAVE & CLOSE</button></div></Modal>)}

      {mDelConfirm&&(<Modal onClose={()=>setMDelConfirm(false)}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:10}}>削除確認</p><p style={{fontSize:12,color:"#3a3a3a",marginBottom:20}}>「{mealSets[delTgtIdx]?.title}」を削除しますか？</p><div style={{display:"flex",gap:8}}><button onClick={()=>setMDelConfirm(false)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#8a8a8a",borderColor:"#ccc"}}>いいえ</button><button onClick={()=>{const n=[...mealSets];n.splice(delTgtIdx,1);setMealSets(n);setCurSetIdx(0);setMDelConfirm(false);setMMealSet(false);}} style={{...BP,flex:1,padding:"10px",fontSize:10,letterSpacing:3,background:"#d62828"}}>削除</button></div></Modal>)}

      {mResetConfirm&&(<Modal onClose={()=>setMResetConfirm(false)}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:10}}>リセット確認</p><p style={{fontSize:12,color:"#3a3a3a",marginBottom:20}}>記入した項目をリセットしますか？</p><div style={{display:"flex",gap:8}}><button onClick={()=>setMResetConfirm(false)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#8a8a8a",borderColor:"#ccc"}}>いいえ</button><button onClick={()=>{const n=[...mealSets];n[resetTgtIdx]={title:"",meals:JSON.parse(JSON.stringify(EMPTY_MEALS))};setMealSets(n);setMResetConfirm(false);}} style={{...BP,flex:1,padding:"10px",fontSize:10,letterSpacing:3,background:"#d62828"}}>リセット</button></div></Modal>)}

      {/* ═══ INFO MODAL (BMR/TDEE/BMI details) ═══ */}
      {mInfo&&(<Modal onClose={()=>setMInfo(false)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>詳細パラメーター</p><p style={{fontSize:10,color:"#7a7a7a",marginTop:3}}>Harris-Benedict 式に基づく計算値</p></div><button onClick={()=>setMInfo(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>{[{l:"BMR",v:Math.round(bmr)+" kcal",d:"基礎代謝量"},{l:"TDEE",v:Math.round(tdee)+" kcal",d:"活動代謝量"},{l:"BMI",v:calcBMI(W,heightNum).toFixed(1),d:"体格指数"}].map(s=>(<div key={s.l} style={{background:"#f8f8f6",borderRadius:6,padding:"14px 10px",textAlign:"center"}}><p style={{fontSize:8,letterSpacing:3,color:"#8a8a8a",marginBottom:6}}>{s.l}</p><p style={{fontSize:18,fontWeight:700,color:"#1a1a1a"}}>{s.v}</p><p style={{fontSize:9,color:"#7a7a7a",marginTop:4}}>{s.d}</p></div>))}</div><div style={{borderTop:"1px solid #ebebea",paddingTop:16}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{[{l:"目標カロリー",v:aFC.calories+" kcal"},{l:"活動レベル",v:ACT[prof.activity]?.label||"—"},{l:"目標",v:prof.goal==="cut"?"カット (−500)":prof.goal==="bulk"?"バルク (+300)":prof.goal==="maintain"?"維持":"任意 ("+prof.goalCustom+")"},{l:"除脂肪体重",v:leanMass+" kg"}].map(s=>(<div key={s.l} style={{marginBottom:12}}><p style={{fontSize:9,color:"#8a8a8a",marginBottom:4}}>{s.l}</p><p style={{fontSize:12,fontWeight:700,color:"#2a2a2a"}}>{s.v}</p></div>))}</div></div><button onClick={()=>setMInfo(false)} style={{...BP,width:"100%",padding:"11px",fontSize:10,letterSpacing:3,marginTop:8}}>CLOSE</button></Modal>)}

      {/* ═══ myセット PICKER MODAL (with bulk/individual toggle) ═══ */}
      {mSetPicker&&!mSetConfirm&&(<Modal onClose={()=>setMSetPicker(null)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>myセットから読込</p><button onClick={()=>setMSetPicker(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#5a5a5a",lineHeight:1}}>✕</button></div>
        {/* 一括/個別 トグル */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}><span style={{fontSize:9,color:mSetBulk?"#1a1a1a":"#aaa",fontWeight:mSetBulk?700:400}}>一括入力</span><div onClick={()=>setMSetBulk(v=>!v)} style={{width:44,height:24,borderRadius:12,cursor:"pointer",background:mSetBulk?"#1a1a1a":"#f4a261",position:"relative",transition:"background .2s"}}><div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:mSetBulk?3:23,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.25)"}}/></div><span style={{fontSize:9,color:!mSetBulk?"#1a1a1a":"#aaa",fontWeight:!mSetBulk?700:400}}>個別入力</span></div>
        <p style={{fontSize:10,color:"#7a7a7a",marginBottom:12}}>{mSetBulk?"セットを選んで一括で反映します":"セットを選び、食事をタップしてください"}</p>
        {/* セット選択タブ */}
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto"}}>{mealSets.map((s,si)=>(<button key={si} onClick={()=>setMSetPicker(prev=>({...prev,selSet:si}))} style={{...BS,fontSize:9,padding:"6px 12px",whiteSpace:"nowrap",background:(mSetPicker.selSet??0)===si?"#1a1a1a":"#fff",color:(mSetPicker.selSet??0)===si?"#fff":"#3a3a3a"}}>{s.title||`セット${si+1}`}</button>))}</div>
        {mSetBulk?(
          /* 一括入力: セット選択→選択ボタン */
          <div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>setMSetPicker(null)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#8a8a8a",borderColor:"#ccc",background:"transparent"}}>キャンセル</button><button onClick={()=>{const si=mSetPicker.selSet??0;setMSetConfirm({si,bulk:true,mode:mSetPicker.mode,idx:mSetPicker.idx,setTitle:mealSets[si].title||`セット${si+1}`});}} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#d62828",borderColor:"#d62828"}}>選択</button></div>
        ):(
          /* 個別入力: 食事一覧 */
          <div style={{display:"flex",flexDirection:"column",gap:4}}>{mealSets[mSetPicker.selSet??0]?.meals.map((ml,mi)=>{const mp=parseFloat(ml.p)||0,mf=parseFloat(ml.f)||0,mc=parseFloat(ml.c)||0;const si=mSetPicker.selSet??0;return(<button key={mi} onClick={()=>setMSetConfirm({si,mi,mode:mSetPicker.mode,idx:mSetPicker.idx,label:ml.label,p:mp,f:mf,c:mc,setTitle:mealSets[si].title||`セット${si+1}`,bulk:false})} style={{...BS,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",fontSize:10,width:"100%",textAlign:"left"}}><span style={{fontWeight:600}}>{ml.label}</span><span style={{color:"#6a6a6a",fontSize:9}}>P:{mp}g  F:{mf}g  C:{mc}g</span></button>);})}</div>
        )}
        {!mSetBulk&&<button onClick={()=>setMSetPicker(null)} style={{...BS,width:"100%",padding:"10px",fontSize:10,letterSpacing:2,marginTop:16,color:"#8a8a8a",borderColor:"#ccc",background:"transparent"}}>キャンセル</button>}
      </Modal>)}

      {/* ═══ myセット CONFIRM MODAL ═══ */}
      {mSetConfirm&&(<Modal onClose={()=>setMSetConfirm(null)}><p style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:10}}>読込確認</p>{mSetConfirm.bulk?(<p style={{fontSize:12,color:"#3a3a3a",marginBottom:20}}>「{mSetConfirm.setTitle}」を反映しますか？</p>):(<><p style={{fontSize:12,color:"#3a3a3a",marginBottom:8}}>「{mSetConfirm.setTitle}」の<strong>「{mSetConfirm.label}」</strong>を読み込みますか？</p><div style={{background:"#f8f8f6",borderRadius:4,padding:"10px 12px",marginBottom:20}}><p style={{fontSize:10,color:"#5a5a5a"}}>P: {mSetConfirm.p}g　F: {mSetConfirm.f}g　C: {mSetConfirm.c}g</p></div></>)}<div style={{display:"flex",gap:8}}><button onClick={()=>setMSetConfirm(null)} style={{...BS,flex:1,padding:"10px",fontSize:10,letterSpacing:2,color:"#8a8a8a",borderColor:"#ccc",background:"transparent"}}>キャンセル</button><button onClick={()=>{if(mSetConfirm.bulk){applyBulkMealSet(mSetConfirm.si,mSetConfirm.mode);}else{applyMealSet(mSetConfirm.si,mSetConfirm.mi,mSetConfirm.mode,mSetConfirm.idx);}setMSetConfirm(null);setMSetPicker(null);}} style={{...BP,flex:1,padding:"10px",fontSize:10,letterSpacing:3,background:"#d62828"}}>はい</button></div></Modal>)}
    </div>
  );
}




ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
