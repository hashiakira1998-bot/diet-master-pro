        function injectGlobalStyles() {
            if (typeof document === "undefined") return;
            if (!document.getElementById("dlp-global-styles")) {
                const style = document.createElement("style");
                style.id = "dlp-global-styles";
                style.textContent = GLOBAL_CSS;
                document.head.appendChild(style);
            }
            if (!document.getElementById("dlp-google-fonts")) {
                const link = document.createElement("link");
                link.id = "dlp-google-fonts";
                link.rel = "stylesheet";
                link.href = "https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap";

        /* === localStorage helpers === */
        const LS_KEY = "dlp_state";
        const loadLS = () => { try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; } };
        const saveLS = (obj) => { try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch (e) { } };

        /* === UTILITIES === */
        const calcBMR = (w, h, a, s) => s === "male" ? (10 * w) + (6.25 * h) - (5 * a) + 5 : (10 * w) + (6.25 * h) - (5 * a) - 161;
        const ACT = {
            sedentary: { label: "座位中心", factor: 1.2 },
            light: { label: "軽い運動(1〜2回)", factor: 1.375 },
            moderate: { label: "中程度(3〜5回)", factor: 1.55 },
            active: { label: "激しい運動(6〜7回)", factor: 1.725 },
            veryActive: { label: "毎日の激しい運動", factor: 1.9 }
        };
        const calcTDEE = (bmr, act) => bmr * (ACT[act] ? ACT[act].factor : 1.55);
        const calcPFC = (tdee, goal, lean, pPct = 30, fPct = 25, custom = "") => {
            let cal = tdee;
            if (goal === "cut") cal = tdee - 500;
            else if (goal === "bulk") cal = tdee + 300;
            else if (goal === "custom" && custom) {
                const n = parseFloat(custom);
                if (!isNaN(n)) cal = tdee + n;
            }
            const p = pPct ? (cal * pPct) / 100 / 4 : lean * 2.2;
            const f = fPct ? (cal * fPct) / 100 / 9 : (cal * 0.25) / 9;
            const c = Math.max(0, (cal - p * 4 - f * 9) / 4);
            return { calories: Math.round(cal), protein: Math.round(p), fat: Math.round(f), carbs: Math.round(c) };
        };
        const calcBMI = (w, h) => w / ((h / 100) ** 2);
        const parseDate = (ds) => {
            if (!ds || typeof ds !== "string") return new Date();
            const p = ds.split("/");
            if (p.length === 3) {
                const d = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
                return isNaN(d) ? new Date() : d;
            }
            return new Date();
        };
        const p2Str = (d) => {
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            const p = d.getDate();
            const const_dt = new Date(y, m - 1, p);
            if (isNaN(const_dt)) return new Date();
            if (d > const_dt) d.setFullYear(y - 1);
            return d;
        };
        const parseISO = (s) => {
            const d = new Date(s);
            return isNaN(d) ? new Date() : d;
        };
        const daysBtwn = (a, b) => Math.round(Math.abs(a - b) / 86400000);
        const getWeekRange = (date) => {
            const d = new Date(date);

            const sun = new Date(d);
            sun.setDate(d.getDate() - day);
            const sat = new Date(sun);
            sat.setDate(sun.getDate() + 6);
            return { start: sun, end: sat };
        };

        /* === COMPONENTS === */
        function TrendChart({ data, mode, onClickDate, goalLine, issnUpper, issnLower, showLines, showIssn = true, chartId = "main" }) {
            if (!data || !data.length) return <div style={{ padding: 20, textAlign: "center", fontSize: 10, color: "#999" }}>データなし</div>;
            
            const label = mode === "weight" ? "weight" : "fat";
            const unit = mode === "weight" ? "kg" : "%";
            const step = mode === "weight" ? 1 : 0.5;
            const lineColor = mode === "weight" ? "#1a1a1a" : "#5a7a5a";
            const const_scrollRef = useRef(null);
            
            const vals = data.map(d => d[label]);
            let filled = [];
            let last = null;
            vals.forEach(v => { if (v !== null) last = v; filled.push(last); });
            const nonNull = filled.filter(v => v !== null);
            if (!nonNull.length) return <div style={{ padding: 20, textAlign: "center", fontSize: 10, color: "#999" }}>データなし</div>;
            
            const const_actualMin = Math.min(...nonNull);
            const const_actualMax = Math.max(...nonNull);
            const const_actualCenter = (const_actualMin + const_actualMax) / 2;
            let rangeMin = const_actualMin - step;
            let rangeMax = const_actualMax + step;
            
            if (showLines) {
                const linesVals = [];
                if (goalLine && goalLine[label] !== undefined) linesVals.push(goalLine[label]);
                if (showIssn) {
                    if (issnUpper && issnUpper[label] !== undefined) linesVals.push(issnUpper[label]);
                    if (issnLower && issnLower[label] !== undefined) linesVals.push(issnLower[label]);
                }
                if (linesVals.length) {
                    const lMin = Math.min(...linesVals);
                    const lMax = Math.max(...linesVals);
                    rangeMin = Math.min(rangeMin, lMin - step);
                    rangeMax = Math.max(rangeMax, lMax + step);
                }
            }
            
            if (rangeMax === rangeMin) { rangeMax += step; rangeMin -= step; }
            const vRange = rangeMax - rangeMin;
            
            const cWidth = Math.max(500, data.length * 36);
            const cHeight = 160;
            const pTop = 15;
            const pBot = 20;
            const dHeight = cHeight - pTop - pBot;
            
            const getY = (v) => { if (v === null || v === undefined) return pTop + dHeight / 2; return pTop + dHeight - ((v - rangeMin) / vRange) * dHeight; };
            const getX = (idx) => 25 + idx * 36;
            
            useEffect(() => { if (const_scrollRef.current) const_scrollRef.current.scrollLeft = const_scrollRef.current.scrollWidth; }, [data]);
            
            return (
                <div style={{ background: "#fff", border: "1px solid #1a1a1a", padding: "12px 8px 8px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: "#666", marginBottom: 6, padding: "0 4px" }}>
                        <span>MAX: {rangeMax.toFixed(1)}{unit}</span>
                        <span style={{ fontWeight: "bold", color: "#1a1a1a" }}>{mode === "weight" ? "WEIGHT TREND" : "FAT % TREND"}</span>
                        <span>MIN: {rangeMin.toFixed(1)}{unit}</span>
                    </div>
                    <div ref={const_scrollRef} style={{ width: "100%", overflowX: "auto", overflowY: "hidden", WebkitOverflowScrolling: "touch" }}>
                        <div style={{ width: cWidth, height: cHeight, position: "relative", backgroundColor: "#fafafa" }}>
                            <svg width={cWidth} height={cHeight} style={{ display: "block" }}>
                                <g stroke="#eaeaea" strokeWidth="0.5" strokeDasharray="2,2">
                                    {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => { const y = pTop + dHeight * pct; return <line key={i} x1="0" y1={y} x2={cWidth} y2={y} />; })}
                                </g>
                                {showLines && goalLine && (
                                    <line x1="0" y1={getY(goalLine[label])} x2={cWidth} y2={getY(goalLine[label])} stroke="#007aff" strokeWidth="1" strokeDasharray="3,3" />
                                )}
                                {showLines && showIssn && issnUpper && issnLower && (
                                    <>
                                        <line x1="0" y1={getY(issnUpper[label])} x2={cWidth} y2={getY(issnUpper[label])} stroke="#e4a853" strokeWidth="0.75" strokeDasharray="2,2" />
                                        <line x1="0" y1={getY(issnLower[label])} x2={cWidth} y2={getY(issnLower[label])} stroke="#e4a853" strokeWidth="0.75" strokeDasharray="2,2" />
                                        <path d={`M 0 ${getY(issnUpper[label])} L ${cWidth} ${getY(issnUpper[label])} L ${cWidth} ${getY(issnLower[label])} L 0 ${getY(issnLower[label])} Z`} fill="#e4a853" fillOpacity="0.04" />
                                    </>
                                )}
                                {data.map((d, i) => {
                                    if (i === 0) return null;
                                    const prevV = filled[i - 1];
                                    const currV = filled[i];
                                    if (prevV === null || currV === null) return null;
                                    return <line key={i} x1={getX(i - 1)} y1={getY(prevV)} x2={getX(i)} y2={getY(currV)} stroke={lineColor} strokeWidth={mode === "weight" ? "1.5" : "1"} strokeDasharray={data[i].weight === null || (mode === "fat" && data[i].fat === null) ? "2,2" : "0"} />;
                                })}
                                {data.map((d, i) => {
                                    const v = d[label];
                                    if (v === null) return null;
                                    const isHi = d.hicarb && mode === "weight";
                                    return (
                                        <g key={i} onClick={() => onClickDate && onClickDate(d.date)} style={{ cursor: "pointer" }}>
                                            <circle cx={getX(i)} cy={getY(v)} r={isHi ? "4" : "2.5"} fill={isHi ? "#e4a853" : lineColor} stroke="#fff" strokeWidth="0.5" />
                                            <text x={getX(i)} y={getY(v) - 6} textAnchor="middle" fontSize="7" fontFamily="DM Mono" fill={isHi ? "#b87818" : "#1a1a1a"}>{v.toFixed(1)}</text>
                                        </g>
                                    );
                                })}
                                {data.map((d, i) => (
                                    <text key={i} x={getX(i)} y={cHeight - 6} textAnchor="middle" fontSize="7" fontFamily="DM Mono" fill={d.hicarb ? "#e4a853" : "#666"} style={{ cursor: "pointer" }} onClick={() => onClickDate && onClickDate(d.date)}>
                                        {fmtShort(d.date)}
                                    </text>
                                ))}
                            </svg>
                        </div>
                    </div>
                </div>
            );
        }

        /* === MAIN APP === */
        function App() {
            injectGlobalStyles();

            // STATE
            const [logs, setLogs] = useState(() => { const saved = loadLS(); return (saved && saved.logs) ? saved.logs : MOCK; });
            const [profile, setProfile] = useState(() => {
                const saved = loadLS();
                return (saved && saved.profile) ? saved.profile : { gender: "male", height: 171, weight: 75, age: 27, activity: "moderate" };
            });
            const [pfcTarget, setPfcTarget] = useState(() => {
                const saved = loadLS();
                return (saved && saved.pfcTarget) ? saved.pfcTarget : { goal: "cut", pPct: 30, fPct: 25, custom: "0", calories: 2000, protein: 150, fat: 55, carbs: 225 };
            });
            const [meals, setMeals] = useState(() => { const saved = loadLS(); return (saved && saved.meals) ? saved.meals : EMPTY_MEALS; });
            const [selDate, setSelDate] = useState(() => fmtDS(new Date()));
            
            // Log Input Temporary State
            const [inW, setInW] = useState("");
            const [inF, setInF] = useState("");
            const [inHi, setInHi] = useState(false);

            // SAVE TRIGGER EFFECT
            useEffect(() => { saveLS({ logs, profile, pfcTarget, meals }); }, [logs, profile, pfcTarget, meals]);

            // AUTO PFC CALCULATOR EFFECT
            useEffect(() => {
                const bmr = calcBMR(profile.weight, profile.height, profile.age, profile.gender);
                const tdee = calcTDEE(bmr, profile.activity);
                const pfc = calcPFC(tdee, pfcTarget.goal, profile.weight * 0.85, pfcTarget.pPct, pfcTarget.fPct, pfcTarget.custom);
                setPfcTarget(prev => ({ ...prev, ...pfc }));
            }, [profile, pfcTarget.goal, pfcTarget.pPct, pfcTarget.fPct, pfcTarget.custom]);

            // LOAD SELECTED DAY DATA EFFECT
            useEffect(() => {
                const found = logs.find(l => l.date === selDate);
                if (found) { setInW(found.weight !== null ? String(found.weight) : ""); setInF(found.fat !== null ? String(found.fat) : ""); setInHi(!!found.hicarb); }
                else { setInW(""); setInF(""); setInHi(false); }
            }, [selDate, logs]);

            // HANDLERS
            const saveLogDay = () => {
                const wNum = inW.trim() === "" ? null : parseFloat(inW);
                const fNum = inF.trim() === "" ? null : parseFloat(inF);
                const idx = logs.findIndex(l => l.date === selDate);
                let newLogs = [...logs];
                if (idx > -1) {
                    if (wNum === null && fNum === null && !inHi) { newLogs.splice(idx, 1); }
                    else { newLogs[idx] = { ...newLogs[idx], weight: wNum, fat: fNum, hicarb: inHi }; }
                } else if (wNum !== null || fNum !== null || inHi) {
                    newLogs.push({ date: selDate, weight: wNum, fat: fNum, hicarb: inHi });
                }
                newLogs.sort((a, b) => a.date.localeCompare(b.date));
                setLogs(newLogs);
            };

            const changeMealRow = (idx, field, val) => {
                const updated = [...meals];
                updated[idx][field] = val;
                setMeals(updated);
            };

            // ANALYSIS CALCULATIONS
            const computedAnalysis = useMemo(() => {
                if (logs.length < 2) return { status: "grey", text: "十分なログデータがありません（2点以上の記録が必要です）。" };
                const validW = logs.filter(l => l.weight !== null);
                if (validW.length < 2) return { status: "grey", text: "体重のデータが2点以上必要です。" };
                
                const oldest = validW[0];
                const latest = validW[validW.length - 1];
                const days = daysBtwn(parseDate(oldest.date), parseDate(latest.date));
                if (days <= 0) return { status: "grey", text: "期間計算にエラーが発生しました。" };

                const diff = latest.weight - oldest.weight;
                const wkPace = (diff / days) * 7;
                const pctWk = (wkPace / oldest.weight) * 100;

                if (pfcTarget.goal === "cut") {
                    if (pctWk <= -1.0) return { status: "purple", text: ADVICE_MSGS.purple[0], val: wkPace, pct: pctWk };
                    if (pctWk > -1.0 && pctWk <= -0.5) return { status: "green", text: ADVICE_MSGS.green[0], val: wkPace, pct: pctWk };
                    if (pctWk > -0.5 && pctWk < -0.1) return { status: "red", text: ADVICE_MSGS.red[0], val: wkPace, pct: pctWk };
                    return { status: "yellow", text: ADVICE_MSGS.yellow[0], val: wkPace, pct: pctWk };
                } else if (pfcTarget.goal === "bulk") {
                    if (pctWk >= 0.5) return { status: "purple", text: "増量ペースが非常に急です。脂肪蓄積のリスクが高いため調整を推奨します。", val: wkPace, pct: pctWk };
                    if (pctWk >= 0.1 && pctWk < 0.5) return { status: "green", text: "理想的なリーンバルクの増量ペースです。クリーンな食事を維持しましょう。", val: wkPace, pct: pctWk };
                    return { status: "yellow", text: "増量ペースが停滞傾向にあります。全体的な摂取カロリーの底上げが必要です。", val: wkPace, pct: pctWk };
                }
                return { status: "green", text: "現在の体重維持状態は安定しています。", val: wkPace, pct: pctWk };
            }, [logs, pfcTarget.goal]);

            const sumMeals = useMemo(() => {
                return meals.reduce((acc, cur) => {
                    const p = parseFloat(cur.p) || 0;
                    const f = parseFloat(cur.f) || 0;
                    const c = parseFloat(cur.c) || 0;
                    return { p: acc.p + p, f: acc.f + f, c: acc.c + c, cal: acc.cal + (p * 4) + (f * 9) + (c * 4) };
                }, { p: 0, f: 0, c: 0, cal: 0 });
            }, [meals]);

            const bmrVal = Math.round(calcBMR(profile.weight, profile.height, profile.age, profile.gender));
            const tdeeVal = Math.round(calcTDEE(bmrVal, profile.activity));

            // GRAPH COMPONENT HELPER VALUES
            const latestW = logs.filter(l => l.weight !== null).pop()?.weight || profile.weight;
            const latestF = logs.filter(l => l.fat !== null).pop()?.fat || 20;
            const goalLine = { weight: latestW * 0.98, fat: latestF * 0.95 };
            const issnUpper = { weight: latestW * 0.995, fat: latestF * 0.99 };
            const issnLower = { weight: latestW * 0.99, fat: latestF * 0.98 };

            return (
                <div style={{ maxWidth: 800, margin: "0 auto", padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
                    
                    {/* Header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderBottom: "1px solid #1a1a1a", paddingBottom: 6 }}>
                        <h1 style={{ fontSize: 16, fontFamily: "Playfair Display", fontWeight: "700", letterSpacing: 1 }}>DIET MASTER PRO</h1>
                        <span style={{ fontSize: 8, color: "#666" }}>v2.1.0 // ENGINE ACTIVE</span>
                    </div>

                    {/* Section 1: Dashboard Profiles & PFC Target Setup */}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
                        
                        {/* Profile Parameters */}
                        <div style={{ background: "#fff", border: "1px solid #1a1a1a", padding: 12 }}>
                            <h2 style={{ fontSize: 10, fontWeight: "bold", borderBottom: "1px solid #eee", paddingBottom: 4, marginBottom: 8 }}>BODY METRICS</h2>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 10 }}>
                                <label>性別:
                                    <select value={profile.gender} onChange={e => setProfile({...profile, gender: e.target.value})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }}>
                                        <option value="male">男性</option>
                                        <option value="female">女性</option>
                                    </select>
                                </label>
                                <label>身長 (cm):
                                    <input type="number" value={profile.height} onChange={e => setProfile({...profile, height: parseFloat(e.target.value) || 0})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                                <label>基準体重 (kg):
                                    <input type="number" value={profile.weight} onChange={e => setProfile({...profile, weight: parseFloat(e.target.value) || 0})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                                <label>年齢:
                                    <input type="number" value={profile.age} onChange={e => setProfile({...profile, age: parseInt(e.target.value) || 0})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                            </div>
                            <label style={{ display: "block", fontSize: 10, marginTop: 8 }}>活動レベル:
                                <select value={profile.activity} onChange={e => setProfile({...profile, activity: e.target.value})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }}>
                                    {Object.keys(ACT).map(k => <option key={k} value={k}>{ACT[k].label} (x{ACT[k].factor})</option>)}
                                </select>
                            </label>
                            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 9, background: "#f9f9f9", padding: 4, borderLeft: "2px solid #1a1a1a" }}>
                                <span>BMR: <strong>{bmrVal} kcal</strong></span>
                                <span>TDEE: <strong>{tdeeVal} kcal</strong></span>
                            </div>
                        </div>

                        {/* PFC Target Logic Parameters */}
                        <div style={{ background: "#fff", border: "1px solid #1a1a1a", padding: 12 }}>
                            <h2 style={{ fontSize: 10, fontWeight: "bold", borderBottom: "1px solid #eee", paddingBottom: 4, marginBottom: 8 }}>PFC TARGET SPEC</h2>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 10 }}>
                                <label>ボディゴール:
                                    <select value={pfcTarget.goal} onChange={e => setPfcTarget({...pfcTarget, goal: e.target.value})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }}>
                                        <option value="cut">減量 (-500 kcal)</option>
                                        <option value="maintain">維持 (±0 kcal)</option>
                                        <option value="bulk">増量 (+300 kcal)</option>
                                        <option value="custom">カスタム調整</option>
                                    </select>
                                </label>
                                {pfcTarget.goal === "custom" && (
                                    <label>オフセット(kcal):
                                        <input type="text" value={pfcTarget.custom} onChange={e => setPfcTarget({...pfcTarget, custom: e.target.value})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                    </label>
                                )}
                                <label>Pタンパク質 (%):
                                    <input type="number" value={pfcTarget.pPct} onChange={e => setPfcTarget({...pfcTarget, pPct: parseInt(e.target.value) || 0})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                                <label>F脂質 (%):
                                    <input type="number" value={pfcTarget.fPct} onChange={e => setPfcTarget({...pfcTarget, fPct: parseInt(e.target.value) || 0})} style={{ width: "100%", padding: 2, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                            </div>
                            <div style={{ marginTop: 10, padding: 6, border: "1px dashed #1a1a1a", backgroundColor: "#fafafa" }}>
                                <div style={{ fontSize: 9, fontWeight: "bold", color: "#444", marginBottom: 2 }}>算出ターゲット：</div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 4, textAlign: "center", fontSize: 10 }}>
                                    <div style={{ background: "#1a1a1a", color: "#fff", padding: 2 }}>{pfcTarget.calories}<span>kcal</span></div>
                                    <div style={{ background: "#eee", padding: 2 }}>P:{pfcTarget.protein}g</div>
                                    <div style={{ background: "#eee", padding: 2 }}>F:{pfcTarget.fat}g</div>
                                    <div style={{ background: "#eee", padding: 2 }}>C:{pfcTarget.carbs}g</div>
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Section 2: Metrics Trend Charts View */}
                    <TrendChart data={logs} mode="weight" onClickDate={setSelDate} goalLine={goalLine} issnUpper={issnUpper} issnLower={issnLower} showLines={pfcTarget.goal === "cut"} />
                    <TrendChart data={logs} mode="fat" onClickDate={setSelDate} goalLine={goalLine} issnUpper={issnUpper} issnLower={issnLower} showLines={pfcTarget.goal === "cut"} />

                    {/* Section 3: Metric Logger & AI Insight Panel */}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
                        
                        {/* Daily Log Recorder */}
                        <div style={{ background: "#fff", border: "1px solid #1a1a1a", padding: 12 }}>
                            <h2 style={{ fontSize: 10, fontWeight: "bold", borderBottom: "1px solid #eee", paddingBottom: 4, marginBottom: 8 }}>DAILY ENTRY LOGGER</h2>
                            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                                <input type="date" value={selDate.replace(/\//g, "-")} onChange={e => setSelDate(e.target.value.replace(/-/g, "/"))} style={{ padding: 3, border: "1px solid #1a1a1a", fontSize: 10, fontFamily: "DM Mono" }} />
                                <label style={{ display: "flex", alignItems: "center", fontSize: 9, cursor: "pointer", userSelect: "none" }}>
                                    <input type="checkbox" checked={inHi} onChange={e => setInHi(e.target.checked)} style={{ marginRight: 3 }} /> ハイカーボ
                                </label>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                                <label style={{ fontSize: 9 }}>体重 (kg):
                                    <input type="number" step="0.1" value={inW} onChange={e => setInW(e.target.value)} placeholder="空欄で削除" style={{ width: "100%", padding: 3, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                                <label style={{ fontSize: 9 }}>体脂肪率 (%):
                                    <input type="number" step="0.1" value={inF} onChange={e => setInF(e.target.value)} placeholder="空欄で削除" style={{ width: "100%", padding: 3, border: "1px solid #ccc", marginTop: 2, fontSize: 9 }} />
                                </label>
                            </div>
                            <button onClick={saveLogDay} style={{ width: "100%", background: "#1a1a1a", color: "#fff", padding: 6, border: "none", cursor: "pointer", fontSize: 9, letterSpacing: 1, fontWeight: "bold" }}>記録を保存</button>
                        </div>

                        {/* Analysis Feedback Engine */}
                        <div style={{ background: "#fff", border: "1px solid #1a1a1a", padding: 12, display: "flex", flexDirection: "column" }}>
                            <h2 style={{ fontSize: 10, fontWeight: "bold", borderBottom: "1px solid #eee", paddingBottom: 4, marginBottom: 6 }}>AI ENGINE ANALYTICS</h2>
                            <div style={{ fontSize: 9, marginBottom: 6, display: "flex", justifyContent: "space-between", background: "#f0f0f0", padding: 4 }}>
                                <span>週換算ペース: <strong>{computedAnalysis.val !== undefined ? `${computedAnalysis.val > 0 ? "+" : ""}${computedAnalysis.val.toFixed(2)} kg/週` : "N/A"}</strong></span>
                                <span>比率: <strong>{computedAnalysis.pct !== undefined ? `${computedAnalysis.pct > 0 ? "+" : ""}${computedAnalysis.pct.toFixed(2)} %` : "N/A"}</strong></span>
                            </div>
                            <div style={{
                                flex: 1, fontSize: 9, padding: 8, borderLeft: "3px solid",
                                borderColor: computedAnalysis.status === "green" ? "#28a745" : computedAnalysis.status === "yellow" ? "#ffc107" : computedAnalysis.status === "red" ? "#dc3545" : computedAnalysis.status === "purple" ? "#6f42c1" : "#6c757d",
                                backgroundColor: computedAnalysis.status === "green" ? "#f4faf5" : computedAnalysis.status === "yellow" ? "#fffdf5" : computedAnalysis.status === "red" ? "#fdf5f6" : computedAnalysis.status === "purple" ? "#f9f6fc" : "#fafafa",
                                lineHeight: "1.4", overflowY: "auto"
                            }}>
                                {computedAnalysis.text}
                            </div>
                        </div>

                    </div>

                    {/* Section 4: Daily Meal Macro Tracking Sheet */}
                    <div style={{ background: "#fff", border: "1px solid #1a1a1a", padding: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderBottom: "1px solid #eee", paddingBottom: 4, marginBottom: 8 }}>
                            <h2 style={{ fontSize: 10, fontWeight: "bold" }}>INTAKE MACRO TRACKING SHEET</h2>
                            <span style={{ fontSize: 8, color: "#666" }}>SELECTED DAY REALTIME EVALUATION</span>
                        </div>
                        <div style={{ overflowX: "auto" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 9, minWidth: 460 }}>
                                <thead>
                                    <tr style={{ background: "#1a1a1a", color: "#fff", textAlign: "left" }}>
                                        <th style={{ padding: 4, fontSize: 8 }}>MEAL TIMING</th>
                                        <th style={{ padding: 4, fontSize: 8 }}>DESCRIPTION</th>
                                        <th style={{ padding: 4, fontSize: 8, width: 45 }}>P (g)</th>
                                        <th style={{ padding: 4, fontSize: 8, width: 45 }}>F (g)</th>
                                        <th style={{ padding: 4, fontSize: 8, width: 45 }}>C (g)</th>
                                        <th style={{ padding: 4, fontSize: 8, width: 50, textAlign: "right" }}>KCAL</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {meals.map((m, i) => {
                                        const pVal = parseFloat(m.p) || 0;
                                        const fVal = parseFloat(m.f) || 0;
                                        const cVal = parseFloat(m.c) || 0;
                                        const rCal = (pVal * 4) + (fVal * 9) + (cVal * 4);
                                        return (
                                            <tr key={i} style={{ borderBottom: "1px solid #eee" }}>
                                                <td style={{ padding: "4px 2px", fontWeight: "bold", color: "#333", fontSize: 8 }}>
                                                    {m.editable ? (
                                                        <input type="text" value={m.label} onChange={e => changeMealRow(i, "label", e.target.value)} style={{ width: "100%", border: "none", background: "#fdfdfd", fontSize: 8, fontWeight: "bold" }} />
                                                    ) : (
                                                        <span>{m.label} <span style={{ color: "#aaa", fontSize: 7, fontWeight: "normal" }}>{m.labelEn}</span></span>
                                                    )}
                                                </td>
                                                <td style={{ padding: 2 }}>
                                                    <input type="text" value={m.desc} onChange={e => changeMealRow(i, "desc", e.target.value)} placeholder="..." style={{ width: "100%", border: "none", padding: 2, background: "transparent" }} />
                                                </td>
                                                <td style={{ padding: 2 }}>
                                                    <input type="number" value={m.p} onChange={e => changeMealRow(i, "p", e.target.value)} style={{ width: "100%", padding: 2, border: "1px solid #eee", fontSize: 8 }} />
                                                </td>
                                                <td style={{ padding: 2 }}>
                                                    <input type="number" value={m.f} onChange={e => changeMealRow(i, "f", e.target.value)} style={{ width: "100%", padding: 2, border: "1px solid #eee", fontSize: 8 }} />
                                                </td>
                                                <td style={{ padding: 2 }}>
                                                    <input type="number" value={m.c} onChange={e => changeMealRow(i, "c", e.target.value)} style={{ width: "100%", padding: 2, border: "1px solid #eee", fontSize: 8 }} />
                                                </td>
                                                <td style={{ padding: 4, textAlign: "right", fontFamily: "DM Mono", fontWeight: "500" }}>{rCal > 0 ? rCal : "-"}</td>
                                            </tr>
                                        );
                                    })}
                                    <tr style={{ background: "#fafafa", fontWeight: "bold", borderTop: "1px solid #1a1a1a" }}>
                                        <td colSpan="2" style={{ padding: 6, fontSize: 8 }}>CURRENT TOTAL / DIFF</td>
                                        <td style={{ padding: 4, color: sumMeals.p > pfcTarget.protein ? "#dc3545" : "#1a1a1a" }}>{sumMeals.p} <div style={{ fontSize: 7, fontWeight: "normal", color: "#666" }}>/{pfcTarget.protein}</div></td>
                                        <td style={{ padding: 4, color: sumMeals.f > pfcTarget.fat ? "#dc3545" : "#1a1a1a" }}>{sumMeals.f} <div style={{ fontSize: 7, fontWeight: "normal", color: "#666" }}>/{pfcTarget.fat}</div></td>
                                        <td style={{ padding: 4, color: sumMeals.c > pfcTarget.carbs ? "#dc3545" : "#1a1a1a" }}>{sumMeals.c} <div style={{ fontSize: 7, fontWeight: "normal", color: "#666" }}>/{pfcTarget.carbs}</div></td>
                                        <td style={{ padding: 6, textAlign: "right", fontFamily: "DM Mono", color: sumMeals.cal > pfcTarget.calories ? "#dc3545" : "#1a1a1a" }}>{sumMeals.cal} <div style={{ fontSize: 7, fontWeight: "normal", color: "#666" }}>/{pfcTarget.calories}</div></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            );
        }

        // React アプリケーションのレンダリング起動
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
